<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us 3D: Карта по Чертежу</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020205; font-family: sans-serif; }
        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* МЕНЮ ВХОДА */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #151633 0%, #05050a 100%);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .menu-box { background: rgba(255,255,255,0.06); padding: 35px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(12px); text-align: center; width: 90%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 32px; color: #ff3333; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,51,51,0.4); letter-spacing: 2px; }
        input { width: 100%; padding: 14px 20px; margin: 10px 0; border-radius: 25px; border: 1px solid #333; background: #0c0d14; color: white; font-size: 16px; text-align: center; outline: none; transition: 0.2s; }
        input:focus { border-color: #ff3333; }
        .menu-btn { width: 100%; padding: 14px; margin-top: 12px; border-radius: 25px; border: none; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; }
        .btn-create { background: #2ecc71; box-shadow: 0 4px 12px rgba(46,204,113,0.2); }
        .btn-join { background: #3498db; box-shadow: 0 4px 12px rgba(52,152,219,0.2); }
        .menu-btn:hover { transform: scale(1.02); }

        /* ЛОББИ ПОДКЛЮЧЕНИЯ */
        #lobby-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 8, 18, 0.98); z-index: 180;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .lobby-box { background: #11121c; border: 2px solid #232538; border-radius: 20px; padding: 30px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        #lobby-status { font-size: 15px; color: #8e92a7; margin: 12px 0; }
        #lobby-players-list { text-align: left; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; max-height: 180px; overflow-y: auto; font-family: monospace; font-size: 15px; margin-bottom: 20px; border: 1px solid #1f2130; color: #2ecc71; }
        #start-game-btn { width: 100%; padding: 15px; background: #e74c3c; color: white; font-weight: bold; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; display: none; box-shadow: 0 0 20px rgba(231,76,60,0.4); }

        /* РУЛЕТКА РОЛЕЙ */
        #role-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 150; align-items: center; justify-content: center; flex-direction: column; }
        #role-text { font-size: 48px; font-weight: 900; letter-spacing: 6px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* ИГРОВОЙ ИНТЕРФЕЙС (HUD) */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(10,11,20,0.85); padding: 18px; border-radius: 12px; border: 1px solid #232538; color: #fff; pointer-events: none; font-family: 'Courier New', monospace; min-width: 250px; }
        #room-code-display { color: #f1c40f; font-weight: bold; font-size: 16px; margin-bottom: 3px; }
        #tasks-container { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        .task { color: #ff6b6b; font-size: 13px; font-weight: bold; }
        .task.done { color: #2ecc71; text-decoration: line-through; opacity: 0.6; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }

        /* УПРАВЛЕНИЕ ДЛЯ ТЕЛЕФОНОВ */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 10; touch-action: none; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.7); border-radius: 50%; position: absolute; pointer-events: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .action-group { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; color: white; font-weight: bold; font-size: 15px; border: 3px solid #3b3d54; background: #171821; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 15px rgba(0,0,0,0.4); transition: 0.1s; }
        .action-btn:active { transform: scale(0.95); }
        #btn-kill { display: none; background: #c0392b; border-color: #e74c3c; }

        /* ОКНО КВЕСТА */
        .pop-up { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; color: white; }
        .pop-up-body { background: #161722; padding: 30px; border-radius: 18px; border: 1px solid #334; width: 85%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-box">
            <h1>AMONG US 3D</h1>
            <input type="text" id="username-input" placeholder="ТВОЙ НИКНЕЙМ" value="Игрок">
            <hr style="border: 0.5px solid #222; margin: 15px 0;">
            <button class="menu-btn btn-create" id="action-create">СОЗДАТЬ ИГРУ</button>
            <input type="number" id="code-input" placeholder="КОД ИЗ 3 ЦИФР">
            <button class="menu-btn btn-join" id="action-join">ВОЙТИ К ДРУГУ</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h2 id="lobby-code-title" style="color: #f1c40f; font-size: 26px;">КОД: ---</h2>
            <p id="lobby-status">Ожидание игроков...</p>
            <div id="lobby-players-list"></div>
            <button id="start-game-btn">НАЧАТЬ МАТЧ 🚀</button>
        </div>
    </div>

    <div id="role-screen"><h1 id="role-text"></h1></div>

    <div id="crosshair"></div>
    <div id="hud">
        <div id="room-code-display">Комната: ---</div>
        <div style="font-size: 11px; color: #888; margin-bottom: 8px;">Игроков на карте: <span id="player-count">1</span></div>
        <div id="tasks-container"></div>
    </div>

    <div id="game-container"></div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div class="action-group">
        <button class="action-btn" id="btn-use" disabled>USE</button>
        <button class="action-btn" id="btn-kill">KILL</button>
    </div>

    <div class="pop-up" id="task-modal">
        <div class="pop-up-body">
            <h2 id="task-title" style="color: #f1c40f; font-size: 22px;">Выполнение задания</h2>
            <p style="margin-top: 15px; color: #bdc3c7; font-size: 14px;">Система откалибрована и синхронизирована!</p>
            <button style="padding: 12px; margin-top: 20px; width:100%; background:#2ecc71; color:white; font-weight:bold; border:none; border-radius:8px; cursor:pointer;" id="btn-task-done">ЗАВЕРШИТЬ</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05050d);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.7); scene.add(ambient);
        const flashlight = new THREE.PointLight(0xffffff, 0.5, 15); scene.add(flashlight);

        const mapGroup = new THREE.Group();
        const interactibles = [];
        const wallsBB = [];
        scene.add(mapGroup);

        // --- ГЕНЕРАЦИЯ КАРТЫ СТРОГО ПО ТВОЕМУ ЧЕРТЕЖУ ---
        function createSector(x, z, w, h, color) {
            const geo = new THREE.PlaneGeometry(w, h);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat); mesh.rotation.x = -Math.PI / 2; mesh.position.set(x, 0, z);
            mapGroup.add(mesh);
        }

        // Полы зон по чертежу
        createSector(0, -12, 8, 6, 0xf9e79f);   // Стол с кнопкой (Кафетерий) - Желтый
        createSector(0, -8, 8, 2, 0xa3e4d7);    // О2 - Зеленый
        createSector(0, -3, 8, 8, 0xd7bde2);    // Управление - Фиолетовый
        createSector(-7, -3, 6, 8, 0xa0522d);   // Шкаф с книгами (Библиотека) - Коричневый
        createSector(-2, 5, 16, 8, 0xbdc3c7);   // Нижний зал (Диваны, Столы, Карта) - Серый
        createSector(7, -3, 6, 24, 0xd5d8dc);   // Главный правый коридор - Серый светлый
        createSector(13, -13, 6, 4, 0x566573);  // Энергоблок - Темно-серый
        createSector(13, -8, 6, 6, 0x5dade2);   // Санузел (Раковина + Туалеты) - Голубой
        createSector(13, -2, 6, 6, 0x3498db);   // Душевые - Синий

        // Создание Стен (с боксами коллизий)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x1c1e2e, roughness: 0.5 });
        function buildWall(x, z, w, d) {
            const geo = new THREE.BoxGeometry(w, 3.5, d);
            const mesh = new THREE.Mesh(geo, wallMat); mesh.position.set(x, 1.75, z);
            mapGroup.add(mesh); wallsBB.push(new THREE.Box3().setFromObject(mesh));
        }

        // Внешние границы всей карты
        buildWall(0, -15.2, 8, 0.4); buildWall(-4.2, -12, 0.4, 6); // Кафетерий верх
        buildWall(-4.2, -8, 0.4, 2); // О2 лево
        buildWall(-10.2, -3, 0.4, 8); buildWall(-7, -7.2, 6, 0.4); buildWall(-7, 1.2, 6, 0.4); // Библиотека
        buildWall(-10.2, 5, 0.4, 8); buildWall(-2, 9.2, 16, 0.4); // Нижний зал
        buildWall(4.2, 7, 0.4, 4); buildWall(7, 9.2, 6, 0.4); // Аппендикс коридора снизу
        buildWall(10.2, 3, 0.4, 12); buildWall(10.2, -13, 0.4, 4); // Правое крыло перегородки
        buildWall(13, -15.2, 6, 0.4); buildWall(16.2, -6.5, 0.4, 17); // Энергоблок и туалеты внешние право

        // Межкомнатные стены с ПРОХОДАМИ (ДВЕРЯМИ) строго как на схеме
        buildWall(4.2, -12, 0.4, 4); // Дверь из Кафетерия в Коридор оставлена свободной (2 метра проход)
        buildWall(4.2, -7.5, 0.4, 3); // Дверь из О2 в Коридор свободна
        buildWall(-2.5, -7.2, 3, 0.4); // Стена между О2 и Управлением
        buildWall(4.2, -3, 0.4, 5); // Стена Управления справа (дверь в коридор снизу свободна)
        buildWall(-4.2, -3, 0.4, 5); // Дверь в библиотеку сверху свободна
        buildWall(13, -10.8, 6, 0.4); // Стена между Энергоблоком и Раковиной
        buildWall(13, -4.8, 6, 0.4);  // Стена между Туалетами и Душевыми
        buildWall(13, 1.2, 6, 0.4);   // Стена Душевых снизу

        // --- МЕБЕЛЬ И ОБЪЕКТЫ НА КАРТЕ ПО ТВОЕМУ РИСУНКУ ---
        function buildFurniture(x, z, w, h, d, color, type = "") {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.6 });
            const mesh = new THREE.Mesh(geo, mat); mesh.position.set(x, h/2, z);
            mapGroup.add(mesh);
            if(type) interactibles.push({ mesh, type, radius: 2.0 });
            else wallsBB.push(new THREE.Box3().setFromObject(mesh)); // Мебель тоже имеет коллизию!
        }

        // Кафетерий
        const tableGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.8, 32);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
        const mainTable = new THREE.Mesh(tableGeo, tableMat); mainTable.position.set(0, 0.4, -12);
        mapGroup.add(mainTable); wallsBB.push(new THREE.Box3().setFromObject(mainTable));
        // Красная кнопка по центру стола
        buildFurniture(0, -12, 0.4, 1.1, 0.4, 0xff0000, "Button");

        // Библиотека (Шкафы с книгами вдоль стен)
        buildFurniture(-9.5, -3, 0.8, 2.5, 6, 0x5c3a21);
        buildFurniture(-7, -6.5, 4, 2.5, 0.8, 0x5c3a21, "Books");

        // Управление (Столы и панели)
        buildFurniture(-3.5, -3, 0.6, 0.9, 4, 0x7f8c8d);
        buildFurniture(0, -5, 3, 1.0, 0.6, 0x34495e, "AdminPanel");

        // Нижний зал
        buildFurniture(-5, 4, 3, 0.8, 1.5, 0x8e44ad); // Обычный стол
        buildFurniture(1, 5, 2, 0.9, 2.5, 0x27ae60, "MapTable"); // Стол с картой
        buildFurniture(-2, 8.5, 3, 0.6, 0.8, 0xf1c40f); // Диваны желтые

        // Энергоблок (Щиток с цветными проводами)
        buildFurniture(15.5, -13, 0.5, 1.5, 1.5, 0x2c3e50, "Wires");

        // Санузел и душевые (Раковина, кабинки)
        buildFurniture(11, -8, 0.6, 1.0, 1.2, 0xffffff, "Sink");
        buildFurniture(14, -2, 3, 1.8, 0.5, 0xbdc3c7); // Перегородки душей

        // Люки вентиляции (Визуальные плоские квадраты на полу по схеме)
        function buildVent(x, z) {
            const geo = new THREE.PlaneGeometry(0.9, 0.9);
            const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 1.0 });
            const mesh = new THREE.Mesh(geo, mat); mesh.rotation.x = -Math.PI/2; mesh.position.set(x, 0.01, z);
            mapGroup.add(mesh);
        }
        buildVent(0, -8); buildVent(15, -14); buildVent(15, -6); buildVent(15, -1); buildVent(-9, 8);


        // --- НАСТРОЙКИ ИГРОКА И УПРАВЛЕНИЯ ---
        const playerBB = new THREE.Box3();
        const playerRadius = 0.35;
        let playerPos = new THREE.Vector3(0, 1.6, -11); // Спавн у стола в Кафетерии
        let yaw = 0, pitch = 0; camera.position.copy(playerPos);

        // Фиксация КЛАВИАТУРЫ ПО САНДАРТУ КЛАВИШ (РАСКЛАДКА НЕ ВЛИЯЕТ)
        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        window.addEventListener('keydown', (e) => { if(e.code in keys) keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { if(e.code in keys) keys[e.code] = false; });

        // Сенсорный/Мышиный Обзор (Камера)
        let isMouseDown = false; let prevMouseX = 0, prevMouseY = 0;
        window.addEventListener('mousedown', (e) => { isMouseDown = true; prevMouseX = e.clientX; prevMouseY = e.clientY; });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === container || isMouseDown) {
                const dx = e.movementX !== undefined ? e.movementX : (e.clientX - prevMouseX);
                const dy = e.movementY !== undefined ? e.movementY : (e.clientY - prevMouseY);
                yaw -= dx * 0.0035; pitch -= dy * 0.0035;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
                prevMouseX = e.clientX; prevMouseY = e.clientY;
            }
        });
        container.addEventListener('click', () => { if(document.getElementById('lobby-screen').style.display === 'none') container.requestPointerLock(); });

        // Тач-обзор для мобилок
        let touchLookId = null; let lastTouchX = 0, lastTouchY = 0;
        window.addEventListener('touchstart', (e) => {
            for(let i=0; i<e.changedTouches.length; i++) {
                let t = e.changedTouches[i]; if(t.clientX > window.innerWidth / 2) { touchLookId = t.identifier; lastTouchX = t.clientX; lastTouchY = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.identifier === touchLookId) {
                    let dx = t.clientX - lastTouchX; let dy = t.clientY - lastTouchY;
                    yaw -= dx * 0.005; pitch -= dy * 0.005;
                    pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
                    lastTouchX = t.clientX; lastTouchY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', (e) => { for(let i=0; i<e.changedTouches.length; i++) { if(e.changedTouches[i].identifier === touchLookId) touchLookId = null; } });

        // Джойстик передвижения
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        let moveVec = { x: 0, z: 0 }; let joystickTouchId = null;

        joystickZone.addEventListener('touchstart', (e) => { joystickTouchId = e.changedTouches[0].identifier; calculateJoystick(e.changedTouches[0]); });
        window.addEventListener('touchmove', (e) => { for(let i=0; i<e.touches.length; i++) { if(e.touches[i].identifier === joystickTouchId) calculateJoystick(e.touches[i]); } });
        window.addEventListener('touchend', (e) => { for(let i=0; i<e.changedTouches.length; i++) { if(e.changedTouches[i].identifier === joystickTouchId) { joystickTouchId = null; joystickStick.style.transform = `translate(0px, 0px)`; moveVec = { x: 0, z: 0 }; } } });

        function calculateJoystick(t) {
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = t.clientX - centerX; let dy = t.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45); const angle = Math.atan2(dy, dx);
            joystickStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveVec.x = Math.cos(angle) * (dist / 45); moveVec.z = Math.sin(angle) * (dist / 45);
        }


        // --- ПУЛ И ДИНАМИЧЕСКАЯ ГЕНЕРАЦИЯ ЗАДАНИЙ ---
        const taskPool = [
            { id: 't-button', text: '🚨 Проверить Главную кнопку (Кафетерий)', type: 'Button' },
            { id: 't-books', text: '📚 Расставить учебники (Библиотека)', type: 'Books' },
            { id: 't-admin', text: '📊 Загрузить данные карт (Управление)', type: 'AdminPanel' },
            { id: 't-map', text: '🗺 Сверить курс корабля (Нижний стол)', type: 'MapTable' },
            { id: 't-wires', text: '🔌 Соединить цветные провода (Энергоблок)', type: 'Wires' },
            { id: 't-sink', text: '🚰 Прочистить фильтр раковины (Санузел)', type: 'Sink' }
        ];
        let myTasks = [];

        function generateUniqueTasks() {
            let shuffled = [...taskPool].sort(() => 0.5 - Math.random());
            myTasks = shuffled.slice(0, 3); // Выдаем 3 абсолютно случайных квеста каждому игроку индивидуально
            const container = document.getElementById('tasks-container');
            container.innerHTML = myTasks.map(t => `<div class="task" id="${t.id}">❌ ${t.text}</div>`).join('');
        }


        // --- СЕТЕВОЙ КОД (МУЛЬТИПЛЕЕР) ---
        let peer = null, connections = [], networkPlayers = {};
        let myId = "", isHost = false, roomCode = "", myUsername = "Игрок", myRole = "Crewmate";
        let lobbyNames = [];

        document.getElementById('action-create').onclick = () => {
            myUsername = document.getElementById('username-input').value || "Хост"; isHost = true;
            roomCode = Math.floor(100 + Math.random() * 900).toString(); initNetwork(`among-blueprint-${roomCode}`);
        };

        document.getElementById('action-join').onclick = () => {
            myUsername = document.getElementById('username-input').value || "Друг"; const code = document.getElementById('code-input').value;
            if(code.length !== 3) return alert("Введите 3 цифры кода!");
            isHost = false; roomCode = code; initNetwork();
        };

        function initNetwork(forcedId = null) {
            peer = forcedId ? new Peer(forcedId) : new Peer();
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
                document.getElementById('lobby-code-title').innerText = `КОД КОМНАТЫ: ${roomCode}`;
                
                lobbyNames.push(myUsername); rebuildLobbyList();

                if(isHost) {
                    const sBtn = document.getElementById('start-game-btn'); sBtn.style.display = 'block';
                    sBtn.onclick = () => {
                        connections.forEach(c => c.send({ type: 'game-start' }));
                        startGameSession();
                        
                        const listIds = connections.map(c => c.peer); listIds.push(myId);
                        const impostorId = listIds[Math.floor(Math.random() * listIds.length)];
                        connections.forEach(c => c.send({ type: 'role', role: c.peer === impostorId ? 'Impostor' : 'Crewmate' }));
                        setupRole(myId === impostorId ? 'Impostor' : 'Crewmate');
                    };
                } else {
                    document.getElementById('lobby-status').innerText = "Ожидаем старта создателем комнаты...";
                    let conn = peer.connect(`among-blueprint-${roomCode}`); bindEvents(conn);
                }
                animateLoop();
            });
            peer.on('connection', (conn) => { bindEvents(conn); });
        }

        function bindEvents(conn) {
            connections.push(conn);
            conn.on('open', () => { conn.send({ type: 'lobby-join', name: myUsername }); });
            conn.on('data', (data) => {
                if(data.type === 'lobby-join') {
                    lobbyNames.push(data.name); rebuildLobbyList();
                    createRemotePlayer(conn.peer, data.name, 0, -11);
                    if(isHost) connections.forEach(c => c.send({ type: 'lobby-sync-names', names: lobbyNames }));
                }
                if(data.type === 'lobby-sync-names') {
                    lobbyNames = data.names; rebuildLobbyList();
                    lobbyNames.forEach(n => { if(n !== myUsername) createRemotePlayer(conn.peer, n, 0, -11); });
                }
                if(data.type === 'game-start') { startGameSession(); }
                if(data.type === 'sync') {
                    if(networkPlayers[conn.peer]) {
                        networkPlayers[conn.peer].mesh.position.set(data.x, 0.6, data.z);
                        networkPlayers[conn.peer].mesh.quaternion.setFromAxisAngle(new THREE.Vector3(0,1,0), data.yaw);
                    }
                }
                if(data.type === 'role') setupRole(data.role);
                if(data.type === 'kill' && data.target === myId) { myRole = "Ghost"; alert("Тебя устранил предатель! Ты стал призраком."); }
            });
        }

        function rebuildLobbyList() { document.getElementById('lobby-players-list').innerHTML = lobbyNames.map(n => `• ${n}`).join('<br>'); }

        function startGameSession() {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('room-code-display').innerText = `Комната: ${roomCode}`;
            generateUniqueTasks();
        }

        function setupRole(role) {
            myRole = role; const scr = document.getElementById('role-screen'); const txt = document.getElementById('role-text');
            scr.style.display = 'flex';
            if(myRole === 'Impostor') { txt.innerText = "ПРЕДАТЕЛЬ"; txt.style.color = "#ff3333"; document.getElementById('btn-kill').style.display = 'flex'; }
            else { txt.innerText = "ЧЛЕН ЭКИПАЖА"; txt.style.color = "#2ecc71"; }
            setTimeout(() => { scr.style.display = 'none'; }, 2000);
        }

        function createRemotePlayer(id, name, x, z) {
            if(networkPlayers[id]) return;
            const g = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16);
            const m = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, roughness: 0.5 });
            const mesh = new THREE.Mesh(g, m); mesh.position.set(x, 0.6, z);
            
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; ctx.fillStyle = '#ffffff'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 40);
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            spr.position.y = 1.2; spr.scale.set(1.8, 0.45, 1); mesh.add(spr);

            scene.add(mesh); networkPlayers[id] = { mesh, name };
            document.getElementById('player-count').innerText = (Object.keys(networkPlayers).length + 1);
        }

        // ---ИГРОВОЙ ДВИЖОК С АДЕКВАТНОЙ СКОРОСТЬЮ И СКОЛЬЖЕНИЕМ---
        let lastSentX = 0, lastSentZ = 0;
        function animateLoop() {
            requestAnimationFrame(animateLoop);
            if(document.getElementById('lobby-screen').style.display !== 'none') { renderer.render(scene, camera); return; }

            if(joystickTouchId === null) {
                moveVec = { x: 0, z: 0 };
                if(keys.KeyW) moveVec.z = 1; if(keys.KeyS) moveVec.z = -1;
                if(keys.KeyA) moveVec.x = -1; if(keys.KeyD) moveVec.x = 1;
            }

            let forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            let side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            
            let oldPos = playerPos.clone();
            const normalSpeed = 0.052; // Комфортная скорость ходьбы (без безумных улетов)

            // Движение и плавное скольжение вдоль стен по X
            playerPos.x += forward.x * moveVec.z * normalSpeed + side.x * moveVec.x * normalSpeed;
            playerBB.setFromCenterAndSize(playerPos, new THREE.Vector3(playerRadius * 2, 2, playerRadius * 2));
            for (let i = 0; i < wallsBB.length; i++) { if (playerBB.intersectsBox(wallsBB[i])) { playerPos.x = oldPos.x; break; } }

            // Движение и плавное скольжение вдоль стен по Z
            playerPos.z += forward.z * moveVec.z * normalSpeed + side.z * moveVec.x * normalSpeed;
            playerBB.setFromCenterAndSize(playerPos, new THREE.Vector3(playerRadius * 2, 2, playerRadius * 2));
            for (let i = 0; i < wallsBB.length; i++) { if (playerBB.intersectsBox(wallsBB[i])) { playerPos.z = oldPos.z; break; } }

            camera.position.copy(playerPos);
            camera.quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw); camera.rotateX(pitch);
            flashlight.position.copy(playerPos);

            if(Math.abs(playerPos.x - lastSentX) > 0.01 || Math.abs(playerPos.z - lastSentZ) > 0.01) {
                connections.forEach(c => { c.send({ type: 'sync', x: playerPos.x, z: playerPos.z, yaw: yaw }); });
                lastSentX = playerPos.x; lastSentZ = playerPos.z;
            }

            // Обработка взаимодействия с заданиями
            let activeInteractible = null;
            interactibles.forEach(p => {
                if(camera.position.distanceTo(p.mesh.position) < p.radius) {
                    // Проверяем, есть ли этот тип объекта в списке личных заданий игрока
                    let matchTask = myTasks.find(t => t.type === p.type);
                    if(matchTask) activeInteractible = matchTask;
                }
            });

            if(activeInteractible) {
                const useBtn = document.getElementById('btn-use');
                useBtn.disabled = false;
                useBtn.onclick = () => {
                    document.getElementById('task-modal').style.display = 'flex';
                    document.getElementById('btn-task-done').onclick = () => {
                        document.getElementById(activeInteractible.id).classList.add('done');
                        document.getElementById('task-modal').style.display = 'none';
                    };
                };
            } else { document.getElementById('btn-use').disabled = true; }

            // Логика кнопки KILL для предателя
            if(myRole === "Impostor") {
                let victimId = null;
                Object.keys(networkPlayers).forEach(id => { if(camera.position.distanceTo(networkPlayers[id].mesh.position) < 2.0) victimId = id; });
                if(victimId) {
                    document.getElementById('btn-kill').style.opacity = "1";
                    document.getElementById('btn-kill').onclick = () => {
                        connections.forEach(c => { if(c.peer === victimId) c.send({ type: 'kill', target: victimId }); });
                        networkPlayers[victimId].mesh.rotation.z = Math.PI / 2; // Кладём цилиндр игрока на бок
                    };
                } else { document.getElementById('btn-kill').style.opacity = "0.3"; document.getElementById('btn-kill').onclick = null; }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
