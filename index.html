<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us 3D: Lobby Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #05050a; font-family: sans-serif; }
        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* МЕНЮ ПОДКЛЮЧЕНИЯ */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0f1026 0%, #030308 100%);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .menu-box { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: center; width: 90%; max-width: 380px; }
        h1 { font-size: 36px; color: #ff3333; margin-bottom: 20px; text-shadow: 0 0 15px rgba(255,51,51,0.5); }
        input { width: 100%; padding: 12px 20px; margin: 10px 0; border-radius: 25px; border: 1px solid #444; background: #111; color: white; font-size: 16px; text-align: center; outline: none; }
        .menu-btn { width: 100%; padding: 14px; margin-top: 10px; border-radius: 25px; border: none; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-create { background: #28a745; }
        .btn-join { background: #007bff; }

        /* ЭКРАН ИГРОВОГО ЛОББИ (ОЖИДАНИЕ ИГРОКОВ) */
        #lobby-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 11, 28, 0.95); z-index: 180;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .lobby-box { background: #11121c; border: 2px solid #334; border-radius: 15px; padding: 25px; width: 85%; max-width: 400px; text-align: center; }
        #lobby-status { font-size: 18px; color: #aaa; margin: 15px 0; }
        #start-game-btn { display: none; width: 100%; padding: 15px; background: #28a745; color: white; font-weight: bold; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; box-shadow: 0 0 15px rgba(40,167,69,0.4); margin-top: 15px; }

        /* РУЛЕТКА РОЛЕЙ */
        #role-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 150; align-items: center; justify-content: center; flex-direction: column; }
        #role-text { font-size: 50px; font-weight: 900; letter-spacing: 5px; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #334; color: #fff; pointer-events: none; font-family: monospace; }
        #room-code-display { color: #f1c40f; font-weight: bold; }
        .task { color: #ff6b6b; font-size: 13px; margin-top: 4px; }
        .task.done { color: #2ecc71; text-decoration: line-through; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }

        /* УПРАВЛЕНИЕ */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 10; touch-action: none; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; position: absolute; pointer-events: none; }
        
        .action-group { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; color: white; font-weight: bold; font-size: 14px; border: 3px solid #556; background: #1e1e28; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btn-kill { display: none; background: #800000; border-color: #ff4d4d; }

        .pop-up { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; color: white; }
        .pop-up-body { background: #15151a; padding: 25px; border-radius: 15px; width: 85%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <!-- Стартовое Меню -->
    <div id="menu-overlay">
        <div class="menu-box">
            <h1>AMONG US 3D</h1>
            <input type="text" id="username-input" placeholder="ТВОЙ НИКНЕЙМ" value="Игрок">
            <hr style="border: 0.5px solid #333; margin: 15px 0;">
            <button class="menu-btn btn-create" id="action-create">СОЗДАТЬ ХОСТ</button>
            <input type="number" id="code-input" placeholder="КОД ИЗ 3 ЦИФР">
            <button class="menu-btn btn-join" id="action-join">ПОДКЛЮЧИТЬСЯ</button>
        </div>
    </div>

    <!-- Новое Лобби Ожидания -->
    <div id="lobby-screen">
        <div class="lobby-box">
            <h2 id="lobby-code-title" style="color: #f1c40f; font-size: 28px;">КОД: ---</h2>
            <p id="lobby-status">Ожидание игроков...</p>
            <div style="margin: 15px 0; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; text-align: left;">
                <p style="color: #667; font-size: 12px; margin-bottom: 5px;">Игроки в лобби:</p>
                <div id="lobby-players-list" style="font-size: 14px; font-family: monospace; color: #2ecc71;">• Ты вошел</div>
            </div>
            <button id="start-game-btn">СТАРТ ИГРЫ 🚀</button>
        </div>
    </div>

    <!-- Экран Рулетки Ролей -->
    <div id="role-screen"><h1 id="role-text"></h1></div>

    <!-- HUD -->
    <div id="crosshair"></div>
    <div id="hud">
        <div id="room-code-display">Комната: Ожидание...</div>
        <div style="font-size: 11px; color: #aaa; margin-bottom: 5px;">Игроков в сети: <span id="player-count">1</span></div>
        <div class="task" id="t-wires">❌ Починить щиток (Энергоблок)</div>
        <div class="task" id="t-button">❌ Проверить Главный стол (Зал)</div>
        <div class="task" id="t-books">❌ Собрать книги (Библиотека)</div>
    </div>

    <div id="game-container"></div>

    <!-- Тач-интерфейс -->
    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    
    <div class="action-group">
        <button class="action-btn" id="btn-use" disabled>USE</button>
        <button class="action-btn" id="btn-kill">KILL</button>
    </div>

    <div class="pop-up" id="task-modal">
        <div class="pop-up-body">
            <h2 id="task-title" style="color: #f1c40f;">Задание</h2>
            <p style="margin-top: 15px; color: #ccc;">Синхронизация систем завершена!</p>
            <button style="padding: 10px; margin-top: 15px; width:100%; background:#28a745; color:white; border:none; border-radius:5px;" id="btn-task-done">ГОТОВО</button>
        </div>
    </div>

    <script>
        // --- СЦЕНА THREE.JS ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambient);
        const flashlight = new THREE.PointLight(0xffffff, 0.6, 15); scene.add(flashlight);

        // --- ГЕОМЕТРИЯ КАРТЫ ПО ТВОЕМУ ШАБЛОНУ ---
        const mapGroup = new THREE.Group();
        const interactibles = [];
        scene.add(mapGroup);

        function buildRoom(x, z, w, h, color) {
            const floorGeo = new THREE.PlaneGeometry(w, h);
            const floorMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2; floor.position.set(x, 0, z);
            mapGroup.add(floor);

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x161722 });
            const hWall = new THREE.BoxGeometry(w, 3.2, 0.2);
            const vWall = new THREE.BoxGeometry(0.2, 3.2, h);

            const wTop = new THREE.Mesh(hWall, wallMat); wTop.position.set(x, 1.6, z - h/2); mapGroup.add(wTop);
            const wBot = new THREE.Mesh(hWall, wallMat); wBot.position.set(x, 1.6, z + h/2); mapGroup.add(wBot);
            const wL = new THREE.Mesh(vWall, wallMat); wL.position.set(x - w/2, 1.6, z); sceneGroup = mapGroup.add(wL);
            const wR = new THREE.Mesh(vWall, wallMat); wR.position.set(x + w/2, 1.6, z); mapGroup.add(wR);
        }

        buildRoom(0, -10, 12, 8, 0xEADAA2);  // Главный Зал
        buildRoom(-1, -3, 10, 6, 0xCBC6E3);  // Управление
        buildRoom(-7, -1, 4, 10, 0x8B5A2B);  // Библиотека
        buildRoom(-1, 5, 10, 6, 0x999999);   // Тактический Центр
        buildRoom(7, -3, 5, 16, 0x44444c);   // Коридор
        buildRoom(12, -4, 4, 3, 0x222225);   // Энергоблок
        buildRoom(12, -0.5, 4, 3, 0x7AC5CD);  // Туалеты
        buildRoom(12, 3, 4, 3, 0x98F5FF);    // Душевые

        function createPoint(x, z, size, color, type) {
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat); mesh.position.set(x, size/2, z);
            mapGroup.add(mesh); interactibles.push({ mesh, type, radius: 2.2 });
        }
        createPoint(0, -10, 1.4, 0xdd2222, "Button");
        createPoint(13, -4, 0.7, 0x00dd00, "Wires");
        createPoint(-8, -2, 0.5, 0x442200, "Books");

        // --- НАСТРОЙКИ ИГРОКА ---
        let playerPos = new THREE.Vector3(0, 1.65, -9);
        let yaw = 0, pitch = 0;
        camera.position.copy(playerPos);

        // --- УПРАВЛЕНИЕ КАМЕРОЙ ---
        let isMouseDown = false;
        let prevMouseX = 0, prevMouseY = 0;

        window.addEventListener('mousedown', (e) => { isMouseDown = true; prevMouseX = e.clientX; prevMouseY = e.clientY; });
        window.addEventListener('mouseup', () => { isMouseDown = false; });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === container || isMouseDown) {
                const deltaX = e.movementX !== undefined ? e.movementX : (e.clientX - prevMouseX);
                const deltaY = e.movementY !== undefined ? e.movementY : (e.clientY - prevMouseY);
                yaw -= deltaX * 0.003; pitch -= deltaY * 0.003;
                pitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, pitch));
                prevMouseX = e.clientX; prevMouseY = e.clientY;
            }
        });
        container.addEventListener('click', () => { if(document.getElementById('lobby-screen').style.display === 'none') container.requestPointerLock(); });

        let touchLookId = null; let lastTouchX = 0, lastTouchY = 0;
        window.addEventListener('touchstart', (e) => {
            for(let i=0; i<e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if(t.clientX > window.innerWidth / 2) { touchLookId = t.identifier; lastTouchX = t.clientX; lastTouchY = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            for(let i=0; i<e.touches.length; i++) {
                let t = e.touches[i];
                if(t.identifier === touchLookId) {
                    let dx = t.clientX - lastTouchX; let dy = t.clientY - lastTouchY;
                    yaw -= dx * 0.007; pitch -= dy * 0.007;
                    pitch = Math.max(-Math.PI/2.4, Math.min(Math.PI/2.4, pitch));
                    lastTouchX = t.clientX; lastTouchY = t.clientY;
                }
            }
        });
        window.addEventListener('touchend', (e) => { for(let i=0; i<e.changedTouches.length; i++) { if(e.changedTouches[i].identifier === touchLookId) touchLookId = null; } });

        // --- ДЖОЙСТИК ХОДЬБЫ ---
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');
        let moveVec = { x: 0, z: 0 }; let joystickTouchId = null;

        joystickZone.addEventListener('touchstart', (e) => { joystickTouchId = e.changedTouches[0].identifier; calculateJoystick(e.changedTouches[0]); });
        window.addEventListener('touchmove', (e) => { for(let i=0; i<e.touches.length; i++) { if(e.touches[i].identifier === joystickTouchId) calculateJoystick(e.touches[i]); } });
        window.addEventListener('touchend', (e) => { for(let i=0; i<e.changedTouches.length; i++) { if(e.changedTouches[i].identifier === joystickTouchId) { joystickTouchId = null; joystickStick.style.transform = `translate(0px, 0px)`; moveVec = { x: 0, z: 0 }; } } });

        function calculateJoystick(t) {
            const rect = joystickZone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = t.clientX - centerX; let dy = t.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45); const angle = Math.atan2(dy, dx);
            joystickStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            moveVec.x = Math.cos(angle) * (dist / 45); moveVec.z = Math.sin(angle) * (dist / 45);
        }

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

        // --- СЕТЕВАЯ ЧАСТЬ С КНОПКОЙ СТАРТА (ЛОББИ) ---
        let peer = null, connections = [], networkPlayers = {};
        let myId = "", isHost = false, roomCode = "", myUsername = "Игрок", myRole = "Crewmate";
        let lobbyNames = [];

        document.getElementById('action-create').onclick = () => {
            myUsername = document.getElementById('username-input').value || "Хост";
            isHost = true;
            roomCode = Math.floor(100 + Math.random() * 900).toString();
            initNetwork(`amongus-room-${roomCode}`);
        };

        document.getElementById('action-join').onclick = () => {
            myUsername = document.getElementById('username-input').value || "Друг";
            const code = document.getElementById('code-input').value;
            if(code.length !== 3) return alert("Введите 3 цифры кода!");
            isHost = false; roomCode = code;
            initNetwork();
        };

        function initNetwork(forcedId = null) {
            peer = forcedId ? new Peer(forcedId) : new Peer();
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('menu-overlay').style.display = 'none';
                
                // Включаем экран Лобби ожидания
                document.getElementById('lobby-screen').style.display = 'flex';
                document.getElementById('lobby-code-title').innerText = `КОД: ${roomCode}`;
                
                lobbyNames.push(myUsername + " (Ты)");
                rebuildLobbyUI();

                if(!isHost) {
                    let conn = peer.connect(`amongus-room-${roomCode}`);
                    bindEvents(conn);
                } else {
                    // Только создателю видна кнопка СТАРТ
                    document.getElementById('start-game-btn').style.display = 'block';
                    document.getElementById('lobby-status').innerText = "Вы — Хост. Ожидайте друзей и жмите Старт.";
                }
                
                // Слушаем нажатие кнопки Старт на Хосте
                document.getElementById('start-game-btn').onclick = () => {
                    if (connections.length === 0) {
                        alert("Нельзя начать игру в одиночку! Подожди, пока зайдут друзья.");
                        return;
                    }
                    startRouletteAndMatch();
                };

                animateLoop();
            });
            peer.on('connection', (conn) => { bindEvents(conn); });
        }

        function bindEvents(conn) {
            connections.push(conn);
            conn.on('open', () => { conn.send({ type: 'lobby-join', name: myUsername }); });
            conn.on('data', (data) => {
                // Кто-то зашел в лобби
                if(data.type === 'lobby-join') {
                    lobbyNames.push(data.name);
                    rebuildLobbyUI();
                    createRemotePlayer(conn.peer, data.name, playerPos.x, playerPos.z);
                    
                    // Хост отправляет всем обновленный список имен
                    if(isHost) {
                        connections.forEach(c => { c.send({ type: 'lobby-sync-names', names: lobbyNames }); });
                    }
                }
                // Синхронизация списка имен в лобби для клиентов
                if(data.type === 'lobby-sync-names') {
                    lobbyNames = data.names;
                    rebuildLobbyUI();
                }
                // Сигнал от хоста: Игра СТАРТОВАЛА
                if(data.type === 'game-start') {
                    document.getElementById('lobby-screen').style.display = 'none';
                    document.getElementById('room-code-display').innerText = `Комната: ${roomCode}`;
                }
                // Движения игроков
                if(data.type === 'sync') {
                    if(networkPlayers[conn.peer]) {
                        networkPlayers[conn.peer].mesh.position.set(data.x, 0.6, data.z);
                        networkPlayers[conn.peer].mesh.quaternion.setFromAxisAngle(new THREE.Vector3(0,1,0), data.yaw);
                    }
                }
                // Роль от рулетки
                if(data.type === 'role') { setupRole(data.role); }
                // Убийство
                if(data.type === 'kill' && data.target === myId) {
                    myRole = "Ghost"; alert("Тебя убили! Ты стал призраком.");
                }
            });
        }

        function rebuildLobbyUI() {
            const listDiv = document.getElementById('lobby-players-list');
            listDiv.innerHTML = lobbyNames.map(name => `• ${name}`).join('<br>');
        }

        // --- ЗАПУСК РУЛЕТКИ ХОСТОМ ПО КНОПКЕ ---
        function startRouletteAndMatch() {
            // Закрываем лобби у всех
            connections.forEach(c => { c.send({ type: 'game-start' }); });
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('room-code-display').innerText = `Комната: ${roomCode}`;

            // Честная рулетка
            const list = connections.map(c => c.peer); list.push(myId);
            const impId = list[Math.floor(Math.random() * list.length)];
            
            connections.forEach(c => { c.send({ type: 'role', role: c.peer === impId ? 'Impostor' : 'Crewmate' }); });
            setupRole(myId === impId ? 'Impostor' : 'Crewmate');
        }

        function setupRole(role) {
            myRole = role;
            const scr = document.getElementById('role-screen'); const txt = document.getElementById('role-text');
            scr.style.display = 'flex';
            if(myRole === 'Impostor') { txt.innerText = "ПРЕДАТЕЛЬ"; txt.style.color = "#ff3333"; document.getElementById('btn-kill').style.display = 'flex'; }
            else { txt.innerText = "ЭКИПАЖ"; txt.style.color = "#2ecc71"; }
            setTimeout(() => { scr.style.display = 'none'; if(!isMobile) container.requestPointerLock(); }, 2500);
        }

        function createRemotePlayer(id, name, x, z) {
            if(networkPlayers[id]) return;
            const g = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 16);
            const m = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const mesh = new THREE.Mesh(g, m); mesh.position.set(x, 0.6, z);
            
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; ctx.fillStyle = '#fff'; ctx.font = '30px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(name, 128, 40);
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            spr.position.y = 1.1; spr.scale.set(2, 0.5, 1); mesh.add(spr);

            scene.add(mesh); networkPlayers[id] = { mesh, name };
            document.getElementById('player-count').innerText = (Object.keys(networkPlayers).length + 1);
        }

        // --- ИГРОВОЙ ЦИКЛ ---
        let lastSentX = 0, lastSentZ = 0;
        function animateLoop() {
            requestAnimationFrame(animateLoop);

            if(document.getElementById('lobby-screen').style.display !== 'none') {
                renderer.render(scene, camera);
                return; // Если мы в лобби, персонаж не бегает
            }

            if(joystickTouchId === null) {
                moveVec = { x: 0, z: 0 };
                if(keys.w) moveVec.z = 1; if(keys.s) moveVec.z = -1;
                if(keys.a) moveVec.x = -1; if(keys.d) moveVec.x = 1;
            }

            let forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            let side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            playerPos.addScaledVector(forward, moveVec.z * 0.08); playerPos.addScaledVector(side, moveVec.x * 0.08);

            playerPos.x = Math.max(-9, Math.min(14, playerPos.x)); playerPos.z = Math.max(-14, Math.min(8, playerPos.z));

            camera.position.copy(playerPos);
            camera.quaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw); camera.rotateX(pitch);
            flashlight.position.copy(playerPos);

            if(Math.abs(playerPos.x - lastSentX) > 0.01 || Math.abs(playerPos.z - lastSentZ) > 0.01) {
                connections.forEach(c => { c.send({ type: 'sync', x: playerPos.x, z: playerPos.z, yaw: yaw }); });
                lastSentX = playerPos.x; lastSentZ = playerPos.z;
            }

            // Таски
            let near = false;
            interactibles.forEach(p => {
                if(camera.position.distanceTo(p.mesh.position) < p.radius) {
                    near = true; document.getElementById('btn-use').disabled = false;
                    document.getElementById('btn-use').onclick = () => {
                        document.getElementById('task-modal').style.display = 'flex';
                        document.getElementById('btn-task-done').onclick = () => {
                            if(p.type === "Button") document.getElementById('t-button').classList.add('done');
                            if(p.type === "Wires") document.getElementById('t-wires').classList.add('done');
                            if(p.type === "Books") document.getElementById('t-books').classList.add('done');
                            document.getElementById('task-modal').style.display = 'none';
                        };
                    };
                }
            });
            if(!near) document.getElementById('btn-use').disabled = true;

            // Kill кнопка
            if(myRole === "Impostor") {
                let victimId = null;
                Object.keys(networkPlayers).forEach(id => { if(camera.position.distanceTo(networkPlayers[id].mesh.position) < 2.0) victimId = id; });
                if(victimId) {
                    document.getElementById('btn-kill').style.opacity = "1";
                    document.getElementById('btn-kill').onclick = () => {
                        connections.forEach(c => { if(c.peer === victimId) c.send({ type: 'kill', target: victimId }); });
                        networkPlayers[victimId].mesh.rotation.z = Math.PI/2;
                    };
                } else { document.getElementById('btn-kill').style.opacity = "0.3"; document.getElementById('btn-kill').onclick = null; }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
