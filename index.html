<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us 3D: Прятки на Выживание</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0c1424; font-family: 'Segoe UI', sans-serif; }
        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* ЭКРАН МЕНЮ */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a233a 0%, #050811 100%);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            overflow-y: auto; padding: 20px;
        }
        .menu-box { background: rgba(15, 25, 44, 0.95); padding: 30px; border-radius: 16px; border: 2px solid #00e5ff; text-align: center; width: 100%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,229,255,0.2); }
        h1 { font-size: 32px; color: #ff2e63; margin-bottom: 5px; letter-spacing: 2px; font-weight: 900; text-shadow: 0 0 15px rgba(255,46,99,0.4); }
        .subtitle { font-size: 12px; color: #00e5ff; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 2px solid #1f4068; background: #0b0c10; color: white; font-size: 16px; text-align: center; outline: none; }
        input:focus { border-color: #00e5ff; }
        
        .roulette-container { margin: 15px 0; background: #070a14; border: 1px solid #1f4068; padding: 15px; border-radius: 8px; position: relative; }
        #roulette-canvas { background: #111; border-radius: 50%; border: 3px solid #00e5ff; }
        .roulette-pointer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 15px solid #ff2e63; z-index: 10; }
        .skin-preview-text { font-size: 14px; margin-top: 8px; color: #aaa; }
        #current-skin-badge { display: inline-block; width: 20px; height: 20px; border-radius: 50%; vertical-align: middle; margin-left: 8px; border: 1px solid #fff; }

        .menu-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-create { background: #00b4d8; box-shadow: 0 4px 14px rgba(0,180,216,0.4); }
        .btn-join { background: #1f4068; }
        .btn-spin { background: #ffb703; color: #000; }
        .menu-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* ЛОББИ */
        #lobby-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070c; z-index: 180; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .lobby-box { background: #0f1624; border: 2px solid #1f4068; border-radius: 16px; padding: 35px; width: 85%; max-width: 420px; text-align: center; }
        #lobby-players-list { text-align: left; background: #05070c; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-size: 16px; margin: 20px 0; border: 1px solid #1f4068; color: #00e5ff; line-height: 1.6; }
        #start-game-btn { width: 100%; padding: 16px; background: #ff2e63; color: white; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255,46,99,0.4); }

        /* ВЫБОР РОЛИ */
        #role-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 150; align-items: center; justify-content: center; flex-direction: column; 
        }
        #role-roulette-box { position: relative; margin-bottom: 25px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        #role-roulette-canvas { background: #050508; border-radius: 50%; border: 4px solid #fff; }
        .role-pointer { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #ffffff; margin-bottom: 5px; }
        #role-title { font-size: 20px; color: #aaa; letter-spacing: 3px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        #role-text { font-size: 44px; font-weight: 900; letter-spacing: 6px; text-align: center; min-height: 55px; }
        #role-sub { font-size: 16px; color: #888; margin-top: 15px; text-align: center; max-width: 80%; }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(11,12,16,0.9); padding: 15px 20px; border-radius: 12px; border: 1px solid #1f4068; color: #fff; pointer-events: none; min-width: 250px; }
        #timer-display { font-size: 24px; color: #ff2e63; font-weight: bold; font-family: monospace; text-align: center; margin-bottom: 5px; background: rgba(255,46,99,0.1); padding: 5px; border-radius: 6px; }
        #room-code-display { color: #00e5ff; font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 10px; }
        #mechanics-info { border-top: 1px solid #1f4068; padding-top: 8px; font-size: 13px; color: #eee; }

        /* СИСТЕМА УВЕДОМЛЕНИЙ ОБ ОТКЛЮЧЕНИИ */
        #notif-container { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .sys-notif { background: rgba(255, 46, 99, 0.9); color: white; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 15px; margin-bottom: 8px; border: 2px solid #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: fadeInRight 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #interaction-prompt { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #00e5ff; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 16px; border: 1px solid #00e5ff; display: none; z-index: 10; text-transform: uppercase; }
        #impostor-map { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 450px; height: 450px; background: rgba(5, 10, 20, 0.9); border: 3px solid #ff2e63; border-radius: 50%; z-index: 400; }

        /* МОБИЛЬНЫЕ КНОПКИ */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid #1f4068; border-radius: 50%; z-index: 10; touch-action: none; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: #00e5ff; border-radius: 50%; position: absolute; pointer-events: none; }
        .action-group { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; color: white; font-weight: bold; font-size: 14px; border: 2px solid #1f4068; background: #0f1624; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        #btn-use-mob { border-color: #00e5ff; color: #00e5ff; }
        #btn-kill-mob { display: none; background: #ff2e63; border-color: #ff2e63; }
        #btn-map-mob { display: none; background: #111; border-color: #ff2e63; color: #ff2e63; }

        @keyframes fadeInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="notif-container"></div>

    <div id="menu-overlay">
        <div class="menu-box">
            <h1>AMONG US 3D</h1>
            <div class="subtitle">Охота на холмах</div>
            
            <input type="text" id="username-input" placeholder="ВАШ НИКНЕЙМ">
            
            <div class="roulette-container">
                <div class="roulette-pointer"></div>
                <canvas id="roulette-canvas" width="120" height="120"></canvas>
                <div class="skin-preview-text">Ваш цвет: <span id="current-skin-badge"></span></div>
                <button class="menu-btn btn-spin" id="spin-btn">Выбрать цвет 🎲</button>
            </div>

            <button class="menu-btn btn-create" id="action-create">Создать лобби</button>
            <input type="number" id="code-input" placeholder="КОД ИЗ 3 ЦИФР">
            <button class="menu-btn btn-join" id="action-join">Войти по коду</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h2 id="lobby-code-title">КОД КОРАБЛЯ: ---</h2>
            <div id="lobby-players-list"></div>
            <button id="start-game-btn">Запустить Прятки 🔪</button>
        </div>
    </div>

    <div id="role-screen">
        <div id="role-roulette-box">
            <div id="role-title">Определение роли</div>
            <div class="role-pointer"></div>
            <canvas id="role-roulette-canvas" width="200" height="200"></canvas>
        </div>
        <h1 id="role-text"></h1>
        <div id="role-sub"></div>
    </div>
    
    <div id="interaction-prompt">Действие [ E ]</div>
    <canvas id="impostor-map" width="450" height="450"></canvas>

    <div id="hud">
        <div id="timer-display">ОСТАЛОСЬ: 02:00</div>
        <div id="room-code-display">Комната: ---</div>
        <div id="mechanics-info">Загрузка систем...</div>
    </div>

    <div id="game-container"></div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div class="action-group">
        <button class="action-btn" id="btn-map-mob">КАРТА (M)</button>
        <button class="action-btn" id="btn-use-mob">ДЕЙСТВИЕ (E)</button>
        <button class="action-btn" id="btn-kill-mob">УБИТЬ (Q)</button>
    </div>

    <script>
        // --- СИСТЕМА СИС-УВЕДОМЛЕНИЙ ---
        function triggerSystemNotification(message) {
            const container = document.getElementById('notif-container');
            const notif = document.createElement('div');
            notif.className = 'sys-notif';
            notif.innerText = message;
            container.appendChild(notif);
            setTimeout(() => { notif.remove(); }, 4000);
        }

        // --- ЛОГИКА КАСТОМИЗАЦИИ ---
        const skinColors = ['#ff2e63', '#00e5ff', '#00b4d8', '#ffb703', '#9d4edd', '#38b000', '#ff70a6', '#f77f00', '#ffffff', '#70e000'];
        let mySelectedColor = localStorage.getItem('among_saved_color') || '#ff2e63';
        let myUsername = localStorage.getItem('among_saved_name') || ("Crewmate_" + Math.floor(Math.random()*900));

        document.getElementById('username-input').value = myUsername;
        document.getElementById('current-skin-badge').style.backgroundColor = mySelectedColor;

        const rCanvas = document.getElementById('roulette-canvas');
        const rCtx = rCanvas.getContext('2d');
        let rouletteAngle = 0;

        function drawRoulette() {
            const numSegments = skinColors.length;
            const arc = (Math.PI * 2) / numSegments;
            for (let i = 0; i < numSegments; i++) {
                rCtx.fillStyle = skinColors[i];
                rCtx.beginPath(); rCtx.moveTo(60, 60);
                rCtx.arc(60, 60, 55, rouletteAngle + i * arc, rouletteAngle + (i + 1) * arc);
                rCtx.fill();
            }
            rCtx.fillStyle = '#0b0c10'; rCtx.beginPath(); rCtx.arc(60, 60, 15, 0, Math.PI*2); rCtx.fill();
        }
        drawRoulette();

        let isSpinning = false;
        document.getElementById('spin-btn').onclick = () => {
            if (isSpinning) return;
            isSpinning = true; let speed = 0.4 + Math.random() * 0.3;
            function animateSpin() {
                rouletteAngle += speed; speed *= 0.98; drawRoulette();
                if (speed > 0.002) { requestAnimationFrame(animateSpin); } 
                else {
                    isSpinning = false;
                    const arc = (Math.PI * 2) / skinColors.length;
                    let normalizedAngle = (3 * Math.PI / 2 - rouletteAngle) % (Math.PI * 2);
                    if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
                    let winningIndex = Math.floor(normalizedAngle / arc) % skinColors.length;
                    mySelectedColor = skinColors[winningIndex];
                    localStorage.setItem('among_saved_color', mySelectedColor);
                    document.getElementById('current-skin-badge').style.backgroundColor = mySelectedColor;
                }
            }
            animateSpin();
        };

        document.getElementById('username-input').oninput = (e) => {
            myUsername = e.target.value || "Игрок"; localStorage.setItem('among_saved_name', myUsername);
        };

        // --- ИНИЦИАЛИЗАЦИЯ THREE.JS ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x3a6073); 
        scene.fog = new THREE.FogExp2(0x3a6073, 0.003);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xfff3e0, 0.8); sunLight.position.set(200, 400, 150); scene.add(sunLight);
        const playerLight = new THREE.PointLight(0xffffff, 0.6, 25); scene.add(playerLight);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const mapGroup = new THREE.Group();
        const wallsBB = [];
        const interactibles = [];
        scene.add(mapGroup);

        function getTerrainHeight(x, z) {
            if (Math.abs(z) < 60) return 0;
            let h = Math.sin(x * 0.015) * Math.cos(z * 0.015) * 14;
            h += Math.sin(x * 0.005) * Math.sin(z * 0.005) * 22;
            return h;
        }

        function generateProceduralGrass() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#27ae60'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<4000; i++) { ctx.fillStyle = Math.random() > 0.5 ? '#1e7e34' : '#2ecc71'; ctx.fillRect(Math.random()*256, Math.random()*256, 2, 2); }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(60, 60); return tex;
        }
        function generateProceduralBark() {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#5c4033'; ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#3d2b22'; for(let i=0; i<20; i++) { ctx.fillRect(Math.random()*128, 0, Math.random()*15, 128); }
            return new THREE.CanvasTexture(canvas);
        }

        const grassTex = generateProceduralGrass();
        const barkTex = generateProceduralBark();

        const mapSize = 2000;
        const floorGeo = new THREE.PlaneGeometry(mapSize, mapSize, 120, 120);
        floorGeo.rotateX(-Math.PI / 2);

        const posAttr = floorGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            let x = posAttr.getX(i);
            let z = posAttr.getZ(i);
            posAttr.setY(i, getTerrainHeight(x, z));
        }
        floorGeo.computeVertexNormals();

        const floorMat = new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.9 });
        const floor = new THREE.Mesh(floorGeo, floorMat); mapGroup.add(floor);

        function createWall(x, z, w, d, h = 30) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0x1c2833, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, getTerrainHeight(x, z) + h/2, z); mapGroup.add(mesh);
            wallsBB.push(new THREE.Box3().setFromObject(mesh));
        }
        const halfM = mapSize / 2;
        createWall(0, -halfM, mapSize, 20); createWall(0, halfM, mapSize, 20);
        createWall(-halfM, 0, 20, mapSize); createWall(halfM, 0, 20, mapSize);

        const riverWidth = 75;
        const riverGeo = new THREE.PlaneGeometry(mapSize, riverWidth);
        const riverMat = new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.1, metalness: 0.5, transparent: true, opacity: 0.8 });
        const river = new THREE.Mesh(riverGeo, riverMat); river.rotation.x = -Math.PI / 2; river.position.set(0, 0.1, 0);
        mapGroup.add(river);

        const bridgeGeo = new THREE.BoxGeometry(45, 2, riverWidth + 4);
        const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x7f8c8d, roughness: 0.9 });
        const bridge = new THREE.Mesh(bridgeGeo, bridgeMat); bridge.position.set(0, 1.1, 0); mapGroup.add(bridge);

        const cloudsGroup = new THREE.Group();
        scene.add(cloudsGroup);
        for(let i=0; i<35; i++) {
            const cloud = new THREE.Group();
            const cloudParts = 4 + Math.floor(Math.random()*5);
            const cMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, transparent: true, opacity: 0.85 });
            for(let j=0; j<cloudParts; j++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(14 + Math.random()*12, 8, 8), cMat);
                s.position.set(j*14 - 25, Math.random()*4, Math.random()*8);
                cloud.add(s);
            }
            cloud.position.set((Math.random()-0.5)*1600, 240 + Math.random()*40, (Math.random()-0.5)*1600);
            cloud.userData = { speed: 0.08 + Math.random()*0.15 };
            cloudsGroup.add(cloud);
        }

        function generateHouse(hx, hz) {
            const hY = getTerrainHeight(hx, hz);
            const size = 36; const h = 11; 
            
            createWallBox(hx, hz - size/2, size, 1, h, hY);
            createWallBox(hx - size/2, hz, 1, size, h, hY);
            createWallBox(hx + size/2, hz, 1, size, h, hY);

            const doorWidth = 4; const doorHeight = 6.5;
            const sideWallW = (size - doorWidth) / 2;

            createWallBox(hx - size/2 + sideWallW/2, hz + size/2, sideWallW, 1, h, hY); 
            createWallBox(hx + size/2 - sideWallW/2, hz + size/2, sideWallW, 1, h, hY); 
            const topWallH = h - doorHeight;
            createWallBox(hx, hz + size/2, doorWidth, 1, topWallH, hY + doorHeight);

            const roofGeo = new THREE.ConeGeometry(size * 0.73, 6.5, 4);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0x962d2d, roughness: 0.7 });
            const roof = new THREE.Mesh(roofGeo, roofMat); 
            roof.position.set(hx, hY + h + 3.25, hz); roof.rotation.y = Math.PI / 4;
            mapGroup.add(roof);
        }

        function createWallBox(x, z, w, d, h, groundY) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0xecf0f1, roughness: 0.7 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, groundY + h/2, z); mapGroup.add(mesh);
            wallsBB.push(new THREE.Box3().setFromObject(mesh));
        }

        const housePositions = [
            {x:-160, z:-180}, {x:220, z:-220}, {x:-220, z:220}, {x:180, z:180}, {x:0, z:-300},
            {x:-420, z:-380}, {x:380, z:420}, {x:-390, z:150}, {x:320, z:-160}, {x:-120, z:390}
        ];
        housePositions.forEach(p => generateHouse(p.x, p.z));

        for(let i = 0; i < 550; i++) {
            let tx = (Math.random() - 0.5) * (mapSize - 160); 
            let tz = (Math.random() - 0.5) * (mapSize - 160);
            if(Math.abs(tz) < 65) tz += 110; 
            
            let ty = getTerrainHeight(tx, tz);
            
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.9, 11, 8), new THREE.MeshStandardMaterial({ map: barkTex }));
            trunk.position.set(tx, ty + 5.5, tz); mapGroup.add(trunk); 
            wallsBB.push(new THREE.Box3().setFromObject(trunk));
            
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(5, 10, 10), new THREE.MeshStandardMaterial({ color: 0x196f3d, roughness: 0.9 }));
            leaves.position.set(tx, ty + 11, tz); mapGroup.add(leaves);
        }

        const ventPositions = [{x:-158, z:-178}, {x:222, z:-218}, {x:-218, z:222}, {x:182, z:182}, {x:0, z:80}, {x:-90, z:-80}];
        ventPositions.forEach((pos, idx) => {
            const vY = getTerrainHeight(pos.x, pos.z);
            const ventGroup = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.2, 4.5), new THREE.MeshStandardMaterial({ color: 0x34495e, metalness: 0.7 }));
            const ring = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.12, 6, 20), new THREE.MeshBasicMaterial({ color: 0x00e5ff }));
            ring.rotation.x = Math.PI / 2; ring.position.y = 0.11;
            ventGroup.add(base, ring); 
            ventGroup.position.set(pos.x, vY + 0.05, pos.z); mapGroup.add(ventGroup);
            
            interactibles.push({ id: `vent-${idx}`, type: 'vent', radius: 5.0, x: pos.x, z: pos.z, y: vY });
        });

        function createAmongUsModel(colorStr) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: colorStr, roughness: 0.5 });
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.95, 20), mat); body.position.y = 0.7; group.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.45, 20, 20), mat); head.position.y = 1.15; group.add(head);
            const pack = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.65, 0.45), mat); pack.position.set(0, 0.75, -0.38); group.add(pack);

            const visorMat = new THREE.MeshStandardMaterial({ color: 0x7ed6df, roughness: 0.1, metalness: 0.8 });
            const visor = new THREE.Mesh(new THREE.BoxGeometry(0.48, 0.28, 0.18), visorMat); visor.position.set(0, 1.02, 0.38); group.add(visor);

            const legGeo = new THREE.CylinderGeometry(0.13, 0.13, 0.35, 12);
            const leftLeg = new THREE.Mesh(legGeo, mat); leftLeg.position.set(-0.18, 0.17, 0);
            const rightLeg = new THREE.Mesh(legGeo, mat); rightLeg.position.set(0.18, 0.17, 0);
            group.add(leftLeg, rightLeg);

            group.userData = { leftLeg, rightLeg, body };
            return group;
        }

        // --- СЕТЕВЫЕ ПЕРЕМЕННЫЕ ---
        let playerPos = new THREE.Vector3(0, 1.6, 150);
        let yaw = 0, pitch = 0; camera.position.copy(playerPos);
        let walkCycle = 0, bobY = 0;

        let myId = "", isHost = false, roomCode = "", myRole = "Crewmate", isDead = false;
        let peer = null, connections = [], networkPlayers = {}, lobbyPlayersData = [];

        let ventUsesLeft = 5, inVent = false, ventTimeLeft = 7, ventInterval = null;
        let matchTimer = 120, gameActive = false, isMapOpen = false;

        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, KeyE: false, KeyQ: false, KeyM: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { 
            if(e.code in keys) keys[e.code] = true; 
            if(e.code === 'KeyM') toggleImpostorMap();
        });
        window.addEventListener('keyup', (e) => { if(e.code in keys) keys[e.code] = false; });

        document.getElementById('action-create').onclick = () => {
            isHost = true; roomCode = Math.floor(100 + Math.random() * 900).toString(); initNetwork(`among-hills-${roomCode}`);
        };
        document.getElementById('action-join').onclick = () => {
            const code = document.getElementById('code-input').value;
            if(code.length !== 3) return alert("Код должен состоять из 3 цифр!");
            isHost = false; roomCode = code; initNetwork();
        };

        function initNetwork(forcedId = null) {
            peer = forcedId ? new Peer(forcedId) : new Peer();
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
                document.getElementById('lobby-code-title').innerText = `КОД КОРАБЛЯ: ${roomCode}`;
                
                lobbyPlayersData.push({ id: myId, name: myUsername, color: mySelectedColor }); rebuildLobbyUI();

                if(isHost) {
                    document.getElementById('start-game-btn').style.display = 'block';
                    document.getElementById('start-game-btn').onclick = () => {
                        document.getElementById('lobby-screen').style.display = 'none';
                        const allIds = connections.map(c => c.peer); allIds.push(myId);
                        const impId = allIds[Math.floor(Math.random() * allIds.length)];
                        connections.forEach(c => {
                            c.send({ type: 'game-start' });
                            c.send({ type: 'assign-role', role: c.peer === impId ? 'Impostor' : 'Crewmate' });
                        });
                        setupGameRole(myId === impId ? 'Impostor' : 'Crewmate'); hostStartGame();
                    };
                } else {
                    let conn = peer.connect(`among-hills-${roomCode}`); setupConnection(conn);
                }
                gameLoop();
            });
            peer.on('connection', (conn) => { setupConnection(conn); });
        }

        function setupConnection(conn) {
            connections.push(conn);
            conn.on('open', () => { conn.send({ type: 'lobby-join', name: myUsername, color: mySelectedColor }); });
            
            // ЖЕСТКИЙ ФИКС ВЫХОДА СЛУЧАЙНОГО ИГРОКА (Ловим событие close)
            conn.on('close', () => {
                let pName = "Игрок";
                if(networkPlayers[conn.peer]) pName = networkPlayers[conn.peer].name;
                
                // Удаляем у себя
                handlePlayerDisconnect(conn.peer, pName);

                // Если мы хост, рассылаем всем остальным команду принудительного удаления этого игрока
                if(isHost) {
                    connections.forEach(c => {
                        if(c.peer !== conn.peer) {
                            c.send({ type: 'player-left-broadcast', id: conn.peer, name: pName });
                        }
                    });
                }
            });

            conn.on('data', (data) => {
                if(isHost) { connections.forEach(oc => { if(oc.peer !== conn.peer) oc.send({ ...data, senderId: conn.peer }); }); }
                const sender = data.senderId || conn.peer;
                
                if(data.type === 'lobby-join') {
                    lobbyPlayersData.push({ id: sender, name: data.name, color: data.color }); rebuildLobbyUI();
                    createRemotePlayer(sender, data.name, data.color);
                    if(isHost) connections.forEach(c => c.send({ type: 'lobby-sync', players: lobbyPlayersData }));
                }
                if(data.type === 'lobby-sync') { lobbyPlayersData = data.players; rebuildLobbyUI(); }
                if(data.type === 'game-start') { document.getElementById('lobby-screen').style.display = 'none'; }
                if(data.type === 'assign-role') { setupGameRole(data.role); }
                if(data.type === 'timer-update') { updateTimerUI(data.time); }
                if(data.type === 'game-over') { endGame(data.winner); }
                
                // Клиенты получают от хоста бродкаст о том, что случайный игрок вышел
                if(data.type === 'player-left-broadcast') {
                    handlePlayerDisconnect(data.id, data.name);
                }

                if(data.type === 'player-move') {
                    if(!networkPlayers[sender]) createRemotePlayer(sender, "Игрок", data.color || '#fff');
                    networkPlayers[sender].mesh.position.set(data.x, data.y, data.z);
                    networkPlayers[sender].mesh.rotation.y = data.rotY;
                    networkPlayers[sender].mesh.visible = !data.hidden;
                    networkPlayers[sender].role = data.role; networkPlayers[sender].isDead = data.isDead;
                    if(data.isDead) {
                        networkPlayers[sender].mesh.rotation.z = Math.PI / 2; 
                    }
                }
                if(data.type === 'kill-target' && data.target === myId) { 
                    isDead = true; myRole = "Ghost"; 
                    alert("Предатель ликвидировал вас! Вы проиграли и не можете возродиться."); 
                }
            });
        }

        // Функция обработки отключения
        function handlePlayerDisconnect(peerId, customName) {
            let disconnectedName = customName || "Игрок";
            if(networkPlayers[peerId]) {
                disconnectedName = networkPlayers[peerId].name;
                scene.remove(networkPlayers[peerId].mesh);
                delete networkPlayers[peerId];
            }
            
            // Выводим системное сообщение на экран
            triggerSystemNotification(`${disconnectedName} покинул игру`);

            connections = connections.filter(c => c.peer !== peerId);
            lobbyPlayersData = lobbyPlayersData.filter(p => p.id !== peerId);
            rebuildLobbyUI();
        }

        function rebuildLobbyUI() {
            document.getElementById('lobby-players-list').innerHTML = lobbyPlayersData.map(p => `<span style="color:${p.color}">■</span> [ГОТОВ] ${p.name}`).join('<br>');
        }

        function createRemotePlayer(id, name, color) {
            if(networkPlayers[id] || id === myId) return;
            const amogusMesh = createAmongUsModel(color);
            
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; ctx.fillStyle = color; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.fillText(name, 128, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.y = 1.7; sprite.scale.set(2, 0.5, 1); amogusMesh.add(sprite);

            scene.add(amogusMesh);
            networkPlayers[id] = { mesh: amogusMesh, name, color, role: 'Crewmate', isDead: false, modelData: amogusMesh.userData, lastPos: new THREE.Vector3() };
        }

        // --- РУЛЕТКА ВЫБОРА РОЛЕЙ ---
        const roleCanvas = document.getElementById('role-roulette-canvas');
        const roleCtx = roleCanvas.getContext('2d');

        function drawRoleWheel(angle) {
            const sectors = 6; const arc = (Math.PI * 2) / sectors;
            roleCtx.clearRect(0, 0, 200, 200);
            for(let i = 0; i < sectors; i++) {
                roleCtx.fillStyle = (i % 2 === 0) ? '#00e5ff' : '#ff2e63';
                roleCtx.beginPath(); roleCtx.moveTo(100, 100);
                roleCtx.arc(100, 100, 95, angle + i * arc, angle + (i + 1) * arc);
                roleCtx.fill();
                roleCtx.save(); roleCtx.translate(100, 100); roleCtx.rotate(angle + i * arc + arc / 2);
                roleCtx.fillStyle = '#000'; roleCtx.font = 'bold 11px sans-serif'; roleCtx.textAlign = 'right';
                roleCtx.fillText(i % 2 === 0 ? 'МИРНЫЙ' : 'ОХОТНИК', 85, 4); roleCtx.restore();
            }
            roleCtx.fillStyle = '#050508'; roleCtx.beginPath(); roleCtx.arc(100, 100, 22, 0, Math.PI * 2); roleCtx.fill();
        }

        function setupGameRole(role) {
            myRole = role;
            document.getElementById('room-code-display').innerText = `Режим Пряток: #${roomCode}`;
            const scr = document.getElementById('role-screen');
            const txt = document.getElementById('role-text');
            const sub = document.getElementById('role-sub');
            scr.style.display = 'flex';

            const sectors = 6; const arc = (Math.PI * 2) / sectors;
            const validIndices = (myRole === 'Impostor') ? [1, 3, 5] : [0, 2, 4];
            const chosenIndex = validIndices[Math.floor(Math.random() * validIndices.length)];
            
            let targetAngle = (1.5 * Math.PI - (chosenIndex + 0.5) * arc);
            while (targetAngle < 0) targetAngle += Math.PI * 2;
            const totalRotation = targetAngle + (Math.PI * 2 * 5);

            let startTimestamp = null; const duration = 2800;
            function animateRoleWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = timestamp - startTimestamp; let progress = Math.min(elapsed / duration, 1);
                let easeOut = 1 - Math.pow(1 - progress, 3);
                drawRoleWheel(easeOut * totalRotation);

                if (progress < 1) { requestAnimationFrame(animateRoleWheel); } 
                else {
                    gameActive = true;
                    if(myRole === 'Impostor') {
                        txt.innerText = "ВЫ ПРЕДАТЕЛЬ"; txt.style.color = "#ff2e63";
                        sub.innerText = "Найдите экипаж на Радар (M).";
                        document.getElementById('btn-kill-mob').style.display = 'flex';
                        document.getElementById('btn-map-mob').style.display = 'flex';
                        document.getElementById('mechanics-info').innerHTML = `⚙️ Роль: <b>Предатель</b><br>🔮 Способность: Радар выживших (M)`;
                    } else {
                        txt.innerText = "ВЫ ЭКИПАЖ"; txt.style.color = "#00e5ff";
                        sub.innerText = "Прячьтесь среди холмов и деревьев. Используйте Люки (E).";
                        updateCrewHUD();
                    }
                    setTimeout(() => { scr.style.display = 'none'; container.requestPointerLock(); }, 2200);
                }
            }
            requestAnimationFrame(animateRoleWheel);
        }

        // --- ОБРАТНЫЙ ОТСЧЁТ ТАЙМЕРА ---
        function hostStartGame() {
            matchTimer = 120; 
            let timerInterval = setInterval(() => {
                if(!gameActive) { clearInterval(timerInterval); return; }
                matchTimer--;
                connections.forEach(c => c.send({ type: 'timer-update', time: matchTimer }));
                updateTimerUI(matchTimer);

                if(matchTimer <= 0) {
                    clearInterval(timerInterval); connections.forEach(c => c.send({ type: 'game-over', winner: 'Crewmate' })); endGame('Crewmate');
                }
                
                let aliveCrew = (myRole === 'Crewmate' && !isDead);
                for(let id in networkPlayers) { if(networkPlayers[id].role === 'Crewmate' && !networkPlayers[id].isDead) aliveCrew = true; }
                if(!aliveCrew) {
                    clearInterval(timerInterval); connections.forEach(c => c.send({ type: 'game-over', winner: 'Impostor' })); endGame('Impostor');
                }
            }, 1000);
        }

        function updateCrewHUD() {
            if(myRole !== 'Crewmate') return;
            document.getElementById('mechanics-info').innerHTML = `⚙️ Роль: <b>Выживший</b><br>🕳️ Заряды Люков: <b>${ventUsesLeft}/5</b><br>⏳ Время внутри люка: ${ventTimeLeft}с`;
        }

        function updateTimerUI(t) {
            let m = Math.floor(t / 60).toString().padStart(2, '0'); let s = (t % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `ОСТАЛОСЬ: ${m}:${s}`;
        }

        function endGame(winner) {
            gameActive = false; document.exitPointerLock();
            alert(winner === 'Impostor' ? "ИГРА ОКОНЧЕНА: ПРЕДАТЕЛЬ ОДЕРЖАЛ ПОБЕДУ!" : "ИГРА ОКОНЧЕНА: ЭКИПАЖ ВЫЖИЛ И ВЫИГРАЛ!");
            window.location.reload();
        }

        // --- КАРТА / РАДАР ---
        const radarCanvas = document.getElementById('impostor-map'); const radarCtx = radarCanvas.getContext('2d');
        function toggleImpostorMap() {
            if(myRole !== 'Impostor' || !gameActive) return;
            isMapOpen = !isMapOpen; radarCanvas.style.display = isMapOpen ? 'block' : 'none';
            if(isMapOpen) document.exitPointerLock(); else container.requestPointerLock();
        }
        function drawRadar() {
            if(!isMapOpen) return; radarCtx.clearRect(0, 0, 450, 450);
            radarCtx.fillStyle = 'rgba(10, 20, 38, 0.9)'; radarCtx.beginPath(); radarCtx.arc(225, 225, 215, 0, Math.PI*2); radarCtx.fill();
            radarCtx.strokeStyle = '#ff2e63'; radarCtx.lineWidth = 3; radarCtx.stroke();
            radarCtx.fillStyle = '#ff2e63'; radarCtx.beginPath(); radarCtx.arc(225, 225, 6, 0, Math.PI*2); radarCtx.fill();
            for(let id in networkPlayers) {
                let p = networkPlayers[id];
                if(p.role === 'Crewmate' && !p.isDead && p.mesh.visible) {
                    let dx = p.mesh.position.x - playerPos.x; let dz = p.mesh.position.z - playerPos.z;
                    let scale = 0.35; let rx = 225 + dx * scale; let ry = 225 + dz * scale;
                    if(Math.sqrt((rx-225)**2 + (ry-225)**2) < 205) {
                        radarCtx.fillStyle = '#00e5ff'; radarCtx.beginPath(); radarCtx.arc(rx, ry, 6, 0, Math.PI*2); radarCtx.fill();
                    }
                }
            }
        }

        // --- УПРАВЛЕНИЕ, ФИЗИКА И ДВИЖЕНИЕ ---
        let lastX = 0, lastZ = 0, ePressedPrev = false, qPressedPrev = false;
        let isMouseDown = false;

        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if ((document.pointerLockElement === container || isMouseDown) && !inVent && gameActive && !isMapOpen && !isDead) {
                yaw -= e.movementX * 0.0025; pitch -= e.movementY * 0.0025;
                pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            }
        });
        container.addEventListener('click', () => { if(gameActive && !isMapOpen && !isDead) container.requestPointerLock(); });

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            
            for(let i=0; i<cloudsGroup.children.length; i++) {
                let c = cloudsGroup.children[i];
                c.position.x += c.userData.speed;
                if(c.position.x > mapSize/2) c.position.x = -mapSize/2;
            }

            if(!gameActive) { renderer.render(scene, camera); return; }

            let currentSpeed = (myRole === 'Impostor') ? 0.075 : 0.055;
            let groundY = getTerrainHeight(playerPos.x, playerPos.z);

            const isInsideRiver = (Math.abs(playerPos.z) < 37);
            const isOnBridge = (Math.abs(playerPos.x) < 23 && isInsideRiver);
            
            if (isInsideRiver && !isOnBridge) {
                groundY = -1.1; 
                currentSpeed *= 0.45; 
            }

            if(!inVent && !isDead) {
                let moveVec = { x: 0, z: 0 };
                if(keys.KeyW || keys.ArrowUp) moveVec.z = 1; if(keys.KeyS || keys.ArrowDown) moveVec.z = -1;
                if(keys.KeyA || keys.ArrowLeft) moveVec.x = -1; if(keys.KeyD || keys.ArrowRight) moveVec.x = 1;

                let dirForward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let dirSide = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let prePos = playerPos.clone();

                playerPos.x += dirForward.x * moveVec.z * currentSpeed + dirSide.x * moveVec.x * currentSpeed;
                let pBB = new THREE.Box3().setFromCenterAndSize(playerPos, new THREE.Vector3(1.2, 2.0, 1.2));
                for(let box of wallsBB) { if(pBB.intersectsBox(box)) { playerPos.x = prePos.x; break; } }

                playerPos.z += dirForward.z * moveVec.z * currentSpeed + dirSide.z * moveVec.x * currentSpeed;
                pBB.setFromCenterAndSize(playerPos, new THREE.Vector3(1.2, 2.0, 1.2));
                for(let box of wallsBB) { if(pBB.intersectsBox(box)) { playerPos.z = prePos.z; break; } }

                if (moveVec.x !== 0 || moveVec.z !== 0) {
                    walkCycle += 0.15;
                    bobY = Math.sin(walkCycle) * 0.05;
                } else { bobY = 0; }
            }
            
            playerPos.y = groundY + 1.6;
            
            if(isDead) {
                camera.position.set(playerPos.x, groundY + 0.4, playerPos.z);
                camera.rotation.set(0, 0, Math.PI / 2.3);
            } else {
                camera.position.set(playerPos.x, playerPos.y + bobY, playerPos.z);
                camera.quaternion.setFromAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.rotateX(pitch);
            }
            
            playerLight.position.copy(playerPos);

            if(Math.abs(playerPos.x - lastX) > 0.01 || Math.abs(playerPos.z - lastZ) > 0.01) {
                connections.forEach(c => c.send({ 
                    type: 'player-move', x: playerPos.x, y: playerPos.y - 0.8, z: playerPos.z, rotY: yaw,
                    hidden: inVent, role: myRole, isDead: isDead, color: mySelectedColor
                }));
                lastX = playerPos.x; lastZ = playerPos.z;
            }

            for(let id in networkPlayers) {
                let p = networkPlayers[id];
                if(!p.isDead) {
                    let distanceMoved = p.mesh.position.distanceTo(p.lastPos || p.mesh.position);
                    if(distanceMoved > 0.01) {
                        p.animTime = (p.animTime || 0) + 0.14;
                        if(p.modelData) {
                            p.modelData.leftLeg.rotation.x = Math.sin(p.animTime) * 0.5;
                            p.modelData.rightLeg.rotation.x = -Math.sin(p.animTime) * 0.5;
                            p.modelData.body.position.y = 0.7 + Math.abs(Math.sin(p.animTime)) * 0.04;
                        }
                    } else {
                        if(p.modelData) { p.modelData.leftLeg.rotation.x = 0; p.modelData.rightLeg.rotation.x = 0; p.modelData.body.position.y = 0.7; }
                    }
                    if(!p.lastPos) p.lastPos = new THREE.Vector3();
                    p.lastPos.copy(p.mesh.position);
                }
            }

            let nearObj = null;
            for(let obj of interactibles) { 
                let dist2D = Math.hypot(playerPos.x - obj.x, playerPos.z - obj.z);
                if(dist2D < obj.radius) { nearObj = obj; break; } 
            }
            
            const prompt = document.getElementById('interaction-prompt');
            if(nearObj && !isDead) {
                prompt.style.display = 'block';
                if(keys.KeyE && !ePressedPrev) {
                    if(nearObj.type === 'vent' && myRole === 'Crewmate') {
                        if(inVent) { exitVentAction(); } 
                        else if(ventUsesLeft > 0) {
                            inVent = true; ventUsesLeft--; ventTimeLeft = 7;
                            playerPos.set(nearObj.x, nearObj.y + 0.4, nearObj.z); updateCrewHUD();
                            connections.forEach(c => c.send({ type: 'player-move', x: playerPos.x, y: -20, z: playerPos.z, rotY: yaw, hidden: true, role: myRole, isDead: false }));
                            ventInterval = setInterval(() => {
                                ventTimeLeft--; updateCrewHUD(); if(ventTimeLeft <= 0) exitVentAction();
                            }, 1000);
                        }
                    }
                }
            } else { prompt.style.display = 'none'; }
            ePressedPrev = keys.KeyE;

            if(myRole === 'Impostor' && !isDead) {
                let targetId = null;
                for(let id in networkPlayers) {
                    if(networkPlayers[id].role === 'Crewmate' && !networkPlayers[id].isDead && camera.position.distanceTo(networkPlayers[id].mesh.position) < 5.5) { targetId = id; break; }
                }
                const killBtn = document.getElementById('btn-kill-mob');
                if(targetId) {
                    killBtn.style.opacity = '1';
                    if(keys.KeyQ && !qPressedPrev) {
                        connections.forEach(c => c.send({ type: 'kill-target', target: targetId }));
                        networkPlayers[targetId].isDead = true; networkPlayers[targetId].mesh.rotation.z = Math.PI / 2;
                    }
                } else { killBtn.style.opacity = '0.3'; }
            }
            qPressedPrev = keys.KeyQ;

            drawRadar(); renderer.render(scene, camera);
        }

        function exitVentAction() { 
            clearInterval(ventInterval); inVent = false; 
            playerPos.z += 4.5; 
            updateCrewHUD(); 
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
