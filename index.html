<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us 3D: Гранд Обнова + Рулетка Ролей</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #050508; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        /* МЕНЮ, РУЛЕТКА СКИНОВ И НАСТРОЙКИ */
        #menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #141a29 0%, #05070c 100%);
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
            overflow-y: auto; padding: 20px;
        }
        .menu-box { background: rgba(15, 22, 36, 0.95); padding: 30px; border-radius: 16px; border: 2px solid #1f4068; text-align: center; width: 100%; max-width: 440px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h1 { font-size: 28px; color: #00e5ff; margin-bottom: 5px; letter-spacing: 2px; font-weight: 900; text-shadow: 0 0 10px rgba(0,229,255,0.4); }
        .subtitle { font-size: 12px; color: #ff2e63; font-weight: bold; margin-bottom: 20px; letter-spacing: 3px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 2px solid #1f4068; background: #0b0c10; color: white; font-size: 16px; text-align: center; outline: none; }
        input:focus { border-color: #00e5ff; }
        
        /* БЛОК РУЛЕТКИ С КАНВАСОМ (СКИНЫ) */
        .roulette-container { margin: 15px 0; background: #0b0c10; border: 1px solid #1f4068; padding: 15px; border-radius: 8px; position: relative; }
        #roulette-canvas { background: #111; border-radius: 50%; border: 3px solid #00e5ff; }
        .roulette-pointer { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 15px solid #ff2e63; z-index: 10; }
        .skin-preview-text { font-size: 14px; margin-top: 8px; color: #aaa; }
        #current-skin-badge { display: inline-block; width: 20px; height: 20px; border-radius: 50%; vertical-align: middle; margin-left: 8px; border: 1px solid #fff; }

        .menu-btn { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: none; font-size: 15px; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-create { background: #00b4d8; box-shadow: 0 4px 14px rgba(0,180,216,0.4); }
        .btn-join { background: #1f4068; }
        .btn-spin { background: #ffb703; color: #000; }
        .menu-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* ЛОББИ */
        #lobby-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05070c; z-index: 180; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .lobby-box { background: #0f1624; border: 2px solid #1f4068; border-radius: 16px; padding: 35px; width: 85%; max-width: 420px; text-align: center; }
        #lobby-players-list { text-align: left; background: #05070c; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; font-size: 16px; margin: 20px 0; border: 1px solid #1f4068; color: #00e5ff; line-height: 1.6; }
        #start-game-btn { width: 100%; padding: 16px; background: #ff2e63; color: white; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; display: none; text-transform: uppercase; box-shadow: 0 4px 15px rgba(255,46,99,0.4); }

        /* ЭКРАН РУЛЕТКИ РОЛЕЙ (ПРЕДАТЕЛЬ / ЭКИПАЖ) */
        #role-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 150; align-items: center; justify-content: center; flex-direction: column; 
        }
        #role-roulette-box { position: relative; margin-bottom: 25px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        #role-roulette-canvas { background: #050508; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .role-pointer { width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #ffffff; margin-bottom: 5px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5)); }
        #role-title { font-size: 20px; color: #aaa; letter-spacing: 3px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        #role-text { font-size: 44px; font-weight: 900; letter-spacing: 6px; text-align: center; min-height: 55px; }
        #role-sub { font-size: 16px; color: #888; margin-top: 15px; text-align: center; max-width: 80%; }

        /* ИНТЕРФЕЙС И ХУД */
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(11,12,16,0.9); padding: 15px 20px; border-radius: 12px; border: 1px solid #1f4068; color: #fff; pointer-events: none; min-width: 250px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        #timer-display { font-size: 24px; color: #ff2e63; font-weight: bold; font-family: monospace; text-align: center; margin-bottom: 5px; background: rgba(255,46,99,0.1); padding: 5px; border-radius: 6px; }
        #room-code-display { color: #00e5ff; font-weight: bold; font-size: 14px; text-align: center; margin-bottom: 10px; }
        #mechanics-info { border-top: 1px solid #1f4068; padding-top: 8px; font-size: 13px; color: #eee; }

        #interaction-prompt { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #00e5ff; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 16px; border: 1px solid #00e5ff; display: none; z-index: 10; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,229,255,0.4); }

        #impostor-map {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; height: 450px; background: rgba(5, 10, 20, 0.9); border: 3px solid #ff2e63;
            border-radius: 50%; z-index: 400; box-shadow: 0 0 50px rgba(255,46,99,0.6);
        }

        /* МОБИЛЬНОЕ УПРАВЛЕНИЕ */
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid #1f4068; border-radius: 50%; z-index: 10; touch-action: none; display: flex; align-items: center; justify-content: center; }
        #joystick-stick { width: 50px; height: 50px; background: #00e5ff; border-radius: 50%; position: absolute; pointer-events: none; }
        .action-group { position: absolute; bottom: 40px; right: 40px; display: flex; flex-direction: column; gap: 15px; z-index: 10; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; color: white; font-weight: bold; font-size: 14px; border: 2px solid #1f4068; background: #0f1624; cursor: pointer; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        #btn-use-mob { border-color: #00e5ff; color: #00e5ff; }
        #btn-kill-mob { display: none; background: #ff2e63; border-color: #ff2e63; box-shadow: 0 0 15px #ff2e63; }
        #btn-map-mob { display: none; background: #111; border-color: #ff2e63; color: #ff2e63; }
    </style>
</head>
<body>

    <div id="menu-overlay">
        <div class="menu-box">
            <h1>AMONG US 3D</h1>
            <div class="subtitle">ГРАНД ОБНОВА: ПРЯТКИ</div>
            
            <input type="text" id="username-input" placeholder="ВАШ НИКНЕЙМ">
            
            <div class="roulette-container">
                <div class="roulette-pointer"></div>
                <canvas id="roulette-canvas" width="120" height="120"></canvas>
                <div class="skin-preview-text">
                    Ваш скин: <span id="current-skin-badge"></span>
                </div>
                <button class="menu-btn btn-spin" id="spin-btn">Крутить рулетку 🎲</button>
            </div>

            <button class="menu-btn btn-create" id="action-create">Создать лобби</button>
            <input type="number" id="code-input" placeholder="КОД ИЗ 3 ЦИФР">
            <button class="menu-btn btn-join" id="action-join">Войти по коду</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="lobby-box">
            <h2 id="lobby-code-title">КОД КОРАБЛЯ: ---</h2>
            <div id="lobby-players-list"></div>
            <button id="start-game-btn">Запустить Прятки 🔪</button>
        </div>
    </div>

    <div id="role-screen">
        <div id="role-roulette-box">
            <div id="role-title">Определение роли</div>
            <div class="role-pointer"></div>
            <canvas id="role-roulette-canvas" width="200" height="200"></canvas>
        </div>
        <h1 id="role-text"></h1>
        <div id="role-sub"></div>
    </div>
    
    <div id="interaction-prompt">Нажмите [ E ]</div>

    <canvas id="impostor-map" width="450" height="450"></canvas>

    <div id="hud">
        <div id="timer-display">ОСТАЛОСЬ: 02:00</div>
        <div id="room-code-display">Комната: ---</div>
        <div id="mechanics-info">Загрузка систем...</div>
    </div>

    <div id="game-container"></div>

    <div id="joystick-zone"><div id="joystick-stick"></div></div>
    <div class="action-group">
        <button class="action-btn" id="btn-map-mob">КАРТА (M)</button>
        <button class="action-btn" id="btn-use-mob">ДЕЙСТВИЕ (E)</button>
        <button class="action-btn" id="btn-kill-mob">УБИТЬ (Q)</button>
    </div>

    <script>
        // --- ЛОГИКА СОХРАНЕНИЙ И РУЛЕТКИ СКИНОВ ---
        const skinColors = ['#ff2e63', '#00e5ff', '#00b4d8', '#ffb703', '#9d4edd', '#38b000', '#ff70a6', '#f77f00', '#ffffff', '#70e000'];
        let mySelectedColor = localStorage.getItem('among_saved_color') || '#ff2e63';
        let myUsername = localStorage.getItem('among_saved_name') || ("Выживший_" + Math.floor(Math.random()*900));

        document.getElementById('username-input').value = myUsername;
        document.getElementById('current-skin-badge').style.backgroundColor = mySelectedColor;

        const rCanvas = document.getElementById('roulette-canvas');
        const rCtx = rCanvas.getContext('2d');
        let rouletteAngle = 0;

        function drawRoulette() {
            const numSegments = skinColors.length;
            const arc = (Math.PI * 2) / numSegments;
            for (let i = 0; i < numSegments; i++) {
                rCtx.fillStyle = skinColors[i];
                rCtx.beginPath(); rCtx.moveTo(60, 60);
                rCtx.arc(60, 60, 55, rouletteAngle + i * arc, rouletteAngle + (i + 1) * arc);
                rCtx.fill();
            }
            rCtx.fillStyle = '#0b0c10'; rCtx.beginPath(); rCtx.arc(60, 60, 15, 0, Math.PI*2); rCtx.fill();
        }
        drawRoulette();

        let isSpinning = false;
        document.getElementById('spin-btn').onclick = () => {
            if (isSpinning) return;
            isSpinning = true;
            let speed = 0.4 + Math.random() * 0.3;
            let friction = 0.98;

            function animateSpin() {
                rouletteAngle += speed; speed *= friction; drawRoulette();
                if (speed > 0.002) { requestAnimationFrame(animateSpin); } 
                else {
                    isSpinning = false;
                    const arc = (Math.PI * 2) / skinColors.length;
                    let normalizedAngle = (3 * Math.PI / 2 - rouletteAngle) % (Math.PI * 2);
                    if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
                    let winningIndex = Math.floor(normalizedAngle / arc) % skinColors.length;
                    
                    mySelectedColor = skinColors[winningIndex];
                    localStorage.setItem('among_saved_color', mySelectedColor);
                    document.getElementById('current-skin-badge').style.backgroundColor = mySelectedColor;
                }
            }
            animateSpin();
        };

        document.getElementById('username-input').oninput = (e) => {
            myUsername = e.target.value || "Игрок";
            localStorage.setItem('among_saved_name', myUsername);
        };


        // --- ИНИЦИАЛИЗАЦИЯ ТРЕХМЕРНОГО МИРА КАРТЫ ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0f1d);
        
        const ambientLight = new THREE.AmbientLight(0xdff0ff, 0.6); scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8); sunLight.position.set(100, 300, 100); scene.add(sunLight);
        const playerLight = new THREE.PointLight(0xffffff, 0.6, 25); scene.add(playerLight);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const mapGroup = new THREE.Group();
        const wallsBB = [];
        const interactibles = [];
        scene.add(mapGroup);

        const mapSize = 2000;
        const floorGeo = new THREE.PlaneGeometry(mapSize, mapSize);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x3b5323, roughness: 0.9, metalness: 0.1 });
        const floor = new THREE.Mesh(floorGeo, floorMat); floor.rotation.x = -Math.PI / 2;
        mapGroup.add(floor);

        const domeGeo = new THREE.SphereGeometry(mapSize / 1.3, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const domeMat = new THREE.MeshBasicMaterial({ color: 0x00a8ff, wireframe: true, transparent: true, opacity: 0.03 });
        const dome = new THREE.Mesh(domeGeo, domeMat); scene.add(dome);

        function createWall(x, z, w, d, h = 6, color = 0x5c6b73) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z); mapGroup.add(mesh);
            wallsBB.push(new THREE.Box3().setFromObject(mesh));
            return mesh;
        }

        const halfM = mapSize / 2;
        createWall(0, -halfM, mapSize, 10, 20, 0x111625);
        createWall(0, halfM, mapSize, 10, 20, 0x111625);
        createWall(-halfM, 0, 10, mapSize, 20, 0x111625);
        createWall(halfM, 0, 10, mapSize, 20, 0x111625);

        const riverWidth = 60;
        const riverGeo = new THREE.PlaneGeometry(mapSize, riverWidth);
        const riverMat = new THREE.MeshStandardMaterial({ color: 0x0077b6, roughness: 0.2, metalness: 0.8 });
        const river = new THREE.Mesh(riverGeo, riverMat); river.rotation.x = -Math.PI / 2; river.position.set(0, 0.05, 0);
        mapGroup.add(river);

        createWall(-halfM / 2 - 10, 0, halfM - 20, riverWidth, 8, 0x005f73);
        createWall(halfM / 2 + 10, 0, halfM - 20, riverWidth, 8, 0x005f73);

        const bridgeGeo = new THREE.BoxGeometry(40, 2, riverWidth + 4);
        const bridgeMat = new THREE.MeshStandardMaterial({ color: 0x6d597a, roughness: 0.9 });
        const bridge = new THREE.Mesh(bridgeGeo, bridgeMat); bridge.position.set(0, 1, 0);
        mapGroup.add(bridge);

        function generateHouse(hx, hz, isTwoStory) {
            const size = 30;
            createWall(hx - size/2, hz, 1, size, isTwoStory ? 12 : 6);
            createWall(hx + size/2, hz, 1, size, isTwoStory ? 12 : 6);
            createWall(hx, hz - size/2, size, 1, isTwoStory ? 12 : 6);
            createWall(hx - size/3, hz + size/2, size/3, 1, isTwoStory ? 12 : 6);
            createWall(hx + size/3, hz + size/2, size/3, 1, isTwoStory ? 12 : 6);

            const roofGeo = new THREE.BoxGeometry(size + 2, 0.5, size + 2);
            const roofMat = new THREE.MeshStandardMaterial({ color: 0xae2012 });
            const roof = new THREE.Mesh(roofGeo, roofMat); roof.position.set(hx, 6, hz); mapGroup.add(roof);

            if(isTwoStory) {
                const roof2 = new THREE.Mesh(roofGeo, roofMat); roof2.position.set(hx, 12, hz); mapGroup.add(roof2);
                const liftGeo = new THREE.BoxGeometry(4, 0.2, 4);
                const liftMat = new THREE.MeshBasicMaterial({ color: 0x00f5d4, wireframe: true });
                const lift = new THREE.Mesh(liftGeo, liftMat); lift.position.set(hx - size/4, 0.1, hz - size/4); mapGroup.add(lift);
                interactibles.push({ id: `stairs-${hx}-${hz}`, mesh: lift, type: 'stairs', radius: 3.5, targetY: 7.6, groundY: 1.6 });
            }
        }
        generateHouse(-150, -150, false); generateHouse(200, -250, true); generateHouse(-250, 200, true); generateHouse(150, 250, false);

        for(let i = 0; i < 120; i++) {
            let tx = (Math.random() - 0.5) * (mapSize - 120); let tz = (Math.random() - 0.5) * (mapSize - 120);
            if(Math.abs(tz) < 50) tz += 100;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x4a3728 }));
            trunk.position.set(tx, 4, tz); mapGroup.add(trunk); wallsBB.push(new THREE.Box3().setFromObject(trunk));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(4, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.9 }));
            leaves.position.set(tx, 8, tz); mapGroup.add(leaves);
            const bush = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: Math.random() > 0.5 ? 0xff4d6d : 0xffb703 }));
            bush.position.set(tx + 3, 1, tz + 3); mapGroup.add(bush);
        }

        const ventPositions = [{x:-145, z:-145}, {x:205, z:-245}, {x:-245, z:205}, {x:155, z:245}, {x:0, z:80}, {x:-100, z:-40}];
        ventPositions.forEach((pos, idx) => {
            const vent = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.1, 16), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 }));
            vent.position.set(pos.x, 0.05, pos.z); mapGroup.add(vent);
            interactibles.push({ id: `vent-${idx}`, mesh: vent, type: 'vent', radius: 4.0, x: pos.x, z: pos.z });
        });


        // --- СЕТЕВОЙ МУЛЬТИПЛЕЕР И КОМНАТЫ ---
        let playerPos = new THREE.Vector3(0, 1.6, 150);
        let yaw = 0, pitch = 0; camera.position.copy(playerPos);
        const playerRadius = 0.8; const playerBB = new THREE.Box3();

        let myId = "", isHost = false, roomCode = "", myRole = "Crewmate";
        let peer = null, connections = [], networkPlayers = {}, lobbyPlayersData = [];

        let ventUsesLeft = 5, inVent = false, ventTimeLeft = 7, ventInterval = null;
        let matchTimer = 120, gameActive = false, isMapOpen = false;

        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false, KeyE: false, KeyQ: false, KeyM: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', (e) => { 
            if(e.code in keys) keys[e.code] = true; 
            if(e.code === 'KeyM' || e.code === 'KeyV') toggleImpostorMap();
        });
        window.addEventListener('keyup', (e) => { if(e.code in keys) keys[e.code] = false; });

        document.getElementById('action-create').onclick = () => {
            isHost = true; roomCode = Math.floor(100 + Math.random() * 900).toString(); initNetwork(`among-hide-${roomCode}`);
        };
        document.getElementById('action-join').onclick = () => {
            const code = document.getElementById('code-input').value;
            if(code.length !== 3) return alert("Введите 3-значный код комнаты!");
            isHost = false; roomCode = code; initNetwork();
        };

        function initNetwork(forcedId = null) {
            peer = forcedId ? new Peer(forcedId) : new Peer();
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('menu-overlay').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
                document.getElementById('lobby-code-title').innerText = `КОД КОРАБЛЯ: ${roomCode}`;
                
                lobbyPlayersData.push({ name: myUsername, color: mySelectedColor }); rebuildLobbyUI();

                if(isHost) {
                    document.getElementById('start-game-btn').style.display = 'block';
                    document.getElementById('start-game-btn').onclick = () => {
                        const allIds = connections.map(c => c.peer); allIds.push(myId);
                        const impId = allIds[Math.floor(Math.random() * allIds.length)];
                        connections.forEach(c => {
                            c.send({ type: 'game-start' });
                            c.send({ type: 'assign-role', role: c.peer === impId ? 'Impostor' : 'Crewmate' });
                        });
                        setupGameRole(myId === impId ? 'Impostor' : 'Crewmate'); hostStartGame();
                    };
                } else {
                    let conn = peer.connect(`among-hide-${roomCode}`); setupConnection(conn);
                }
                gameLoop();
            });
            peer.on('connection', (conn) => { setupConnection(conn); });
        }

        function setupConnection(conn) {
            connections.push(conn);
            conn.on('open', () => { conn.send({ type: 'lobby-join', name: myUsername, color: mySelectedColor }); });
            conn.on('data', (data) => {
                if(isHost) { connections.forEach(oc => { if(oc.peer !== conn.peer) oc.send({ ...data, senderId: conn.peer }); }); }
                const sender = data.senderId || conn.peer;
                if(data.type === 'lobby-join') {
                    lobbyPlayersData.push({ name: data.name, color: data.color }); rebuildLobbyUI();
                    createRemoteMesh(sender, data.name, data.color);
                    if(isHost) connections.forEach(c => c.send({ type: 'lobby-sync', players: lobbyPlayersData }));
                }
                if(data.type === 'lobby-sync') { lobbyPlayersData = data.players; rebuildLobbyUI(); }
                if(data.type === 'game-start') { document.getElementById('lobby-screen').style.display = 'none'; }
                if(data.type === 'assign-role') { setupGameRole(data.role); }
                if(data.type === 'timer-update') { updateTimerUI(data.time); }
                if(data.type === 'game-over') { endGame(data.winner); }
                if(data.type === 'player-move') {
                    if(!networkPlayers[sender]) createRemoteMesh(sender, "Игрок", data.color || '#fff');
                    networkPlayers[sender].mesh.position.set(data.x, data.y, data.z);
                    networkPlayers[sender].mesh.visible = !data.hidden; networkPlayers[sender].role = data.role; networkPlayers[sender].isDead = data.isDead;
                    if(data.isDead) networkPlayers[sender].mesh.rotation.z = Math.PI / 2;
                }
                if(data.type === 'kill-target' && data.target === myId) { myRole = "Ghost"; alert("Вы пойманы Предателем!"); }
            });
        }

        function rebuildLobbyUI() {
            document.getElementById('lobby-players-list').innerHTML = lobbyPlayersData.map(p => `<span style="color:${p.color}">■</span> [ГОТОВ] ${p.name}`).join('<br>');
        }

        function createRemoteMesh(id, name, color) {
            if(networkPlayers[id] || id === myId) return;
            const geo = new THREE.CylinderGeometry(0.6, 0.6, 1.5, 16);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat); mesh.position.set(0, 0.75, 0);

            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64; ctx.fillStyle = color; ctx.font = 'bold 22px Arial'; ctx.textAlign = 'center'; ctx.fillText(name, 128, 40);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
            sprite.position.y = 1.5; sprite.scale.set(2, 0.5, 1); mesh.add(sprite);

            scene.add(mesh); networkPlayers[id] = { mesh, name, color, role: 'Crewmate', isDead: false };
        }


        // --- ЛОГИКА РУЛЕТКИ ПРЕДАТЕЛЯ И РОЛЕЙ ---
        const roleCanvas = document.getElementById('role-roulette-canvas');
        const roleCtx = roleCanvas.getContext('2d');

        function drawRoleWheel(angle) {
            const sectors = 6; const arc = (Math.PI * 2) / sectors;
            roleCtx.clearRect(0, 0, 200, 200);
            for(let i = 0; i < sectors; i++) {
                // Чередуем сектора: четные — Экипаж (Голубой), нечетные — Предатель (Красный)
                roleCtx.fillStyle = (i % 2 === 0) ? '#00e5ff' : '#ff2e63';
                roleCtx.beginPath(); roleCtx.moveTo(100, 100);
                roleCtx.arc(100, 100, 95, angle + i * arc, angle + (i + 1) * arc);
                roleCtx.fill();

                // Текст на секторах
                roleCtx.save(); roleCtx.translate(100, 100); roleCtx.rotate(angle + i * arc + arc / 2);
                roleCtx.fillStyle = '#000000'; roleCtx.font = 'bold 11px sans-serif'; roleCtx.textAlign = 'right';
                roleCtx.fillText(i % 2 === 0 ? 'МИРНЫЙ' : 'ОХОТНИК', 85, 4); roleCtx.restore();
            }
            // Центральная заглушка
            roleCtx.fillStyle = '#050508'; roleCtx.beginPath(); roleCtx.arc(100, 100, 22, 0, Math.PI * 2); roleCtx.fill();
            roleCtx.strokeStyle = '#ffffff'; roleCtx.lineWidth = 2; roleCtx.stroke();
        }

        function setupGameRole(role) {
            myRole = role;
            document.getElementById('room-code-display').innerText = `Орбита Пряток: #${roomCode}`;
            
            const scr = document.getElementById('role-screen');
            const txt = document.getElementById('role-text');
            const sub = document.getElementById('role-sub');
            
            txt.innerText = ""; sub.innerText = "";
            scr.style.display = 'flex';

            // Математический расчет остановки рулетки под стрелку сверху (угол 1.5 * PI)
            const sectors = 6; const arc = (Math.PI * 2) / sectors;
            const validIndices = (myRole === 'Impostor') ? [1, 3, 5] : [0, 2, 4];
            const chosenIndex = validIndices[Math.floor(Math.random() * validIndices.length)];
            
            let targetAngle = (1.5 * Math.PI - (chosenIndex + 0.5) * arc);
            while (targetAngle < 0) targetAngle += Math.PI * 2;
            const totalRotation = targetAngle + (Math.PI * 2 * 6); // 6 полных кругов саспенса

            let startTimestamp = null;
            const duration = 3500; // 3.5 секунды кручения

            function animateRoleWheel(timestamp) {
                if (!startTimestamp) startTimestamp = timestamp;
                let elapsed = timestamp - startTimestamp;
                let progress = Math.min(elapsed / duration, 1);
                
                // Функция плавного замедления (Ease Out Cubic)
                let easeOut = 1 - Math.pow(1 - progress, 3);
                let currentAngle = easeOut * totalRotation;
                
                drawRoleWheel(currentAngle);

                if (progress < 1) { requestAnimationFrame(animateRoleWheel); } 
                else {
                    // Колесо остановилось — выдаем вердикт!
                    gameActive = true;
                    if(myRole === 'Impostor') {
                        txt.innerText = "ВЫ ПРЕДАТЕЛЬ"; txt.style.color = "#ff2e63";
                        sub.innerText = "Ваша цель — поймать команду за 2 минуты. Открывайте Портативный Радар кнопкой [ M ]!";
                        document.getElementById('btn-kill-mob').style.display = 'flex';
                        document.getElementById('btn-map-mob').style.display = 'flex';
                        document.getElementById('mechanics-info').innerHTML = `⚙️ Роль: <b>Предатель</b><br>🔮 Способность: Радар выживших (M)`;
                    } else {
                        txt.innerText = "ВЫ ЭКИПАЖ"; txt.style.color = "#00e5ff";
                        sub.innerText = "У вас нет карты. Скрывайтесь в кустах и Люках безопасности (кнопка E) до конца таймера!";
                        updateCrewHUD();
                    }
                    setTimeout(() => { scr.style.display = 'none'; }, 3000);
                }
            }
            requestAnimationFrame(animateRoleWheel);
        }


        // --- ИГРОВАЯ СИСТЕМА И ТАЙМЕРЫ МАТЧА ---
        function hostStartGame() {
            let timerInterval = setInterval(() => {
                if(!gameActive) { clearInterval(timerInterval); return; }
                matchTimer--;
                connections.forEach(c => c.send({ type: 'timer-update', time: matchTimer }));
                updateTimerUI(matchTimer);

                if(matchTimer <= 0) {
                    clearInterval(timerInterval); connections.forEach(c => c.send({ type: 'game-over', winner: 'Crewmate' })); endGame('Crewmate');
                }
                let aliveCrew = (myRole === 'Crewmate');
                for(let id in networkPlayers) { if(networkPlayers[id].role === 'Crewmate' && !networkPlayers[id].isDead) aliveCrew = true; }
                if(!aliveCrew) {
                    clearInterval(timerInterval); connections.forEach(c => c.send({ type: 'game-over', winner: 'Impostor' })); endGame('Impostor');
                }
            }, 1000);
        }

        function updateCrewHUD() {
            if(myRole !== 'Crewmate') return;
            document.getElementById('mechanics-info').innerHTML = `⚙️ Роль: <b>Выживший</b><br>🕳️ Заряды Люков: <b>${ventUsesLeft}/5</b><br>⏳ Время в люке: ${ventTimeLeft}с`;
        }

        function updateTimerUI(t) {
            let m = Math.floor(t / 60).toString().padStart(2, '0'); let s = (t % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `ОСТАЛОСЬ: ${m}:${s}`;
        }

        function endGame(winner) {
            gameActive = false; document.exitPointerLock();
            alert(winner === 'Impostor' ? "ПОБЕДА ПРЕДАТЕЛЯ! Он поймал всех." : "ПОБЕДА ЭКИПАЖА! Кто-то смог выжить.");
            window.location.reload();
        }


        // --- РАДАР ПРЕДАТЕЛЯ ---
        const radarCanvas = document.getElementById('impostor-map');
        const radarCtx = radarCanvas.getContext('2d');

        function toggleImpostorMap() {
            if(myRole !== 'Impostor' || !gameActive) return;
            isMapOpen = !isMapOpen; radarCanvas.style.display = isMapOpen ? 'block' : 'none';
            if(isMapOpen) document.exitPointerLock();
        }

        function drawRadar() {
            if(!isMapOpen) return;
            radarCtx.clearRect(0, 0, 450, 450);
            radarCtx.fillStyle = 'rgba(5, 15, 30, 0.85)'; radarCtx.beginPath(); radarCtx.arc(225, 225, 210, 0, Math.PI*2); radarCtx.fill();
            radarCtx.strokeStyle = '#ff2e63'; radarCtx.lineWidth = 2; radarCtx.stroke();
            radarCtx.fillStyle = '#ff2e63'; radarCtx.beginPath(); radarCtx.arc(225, 225, 7, 0, Math.PI*2); radarCtx.fill();

            for(let id in networkPlayers) {
                let p = networkPlayers[id];
                if(p.role === 'Crewmate' && !p.isDead && p.mesh.visible) {
                    let dx = p.mesh.position.x - playerPos.x; let dz = p.mesh.position.z - playerPos.z;
                    let scale = 0.35; let rx = 225 + dx * scale; let ry = 225 + dz * scale;
                    if(Math.sqrt((rx-225)**2 + (ry-225)**2) < 205) {
                        radarCtx.fillStyle = '#00e5ff'; radarCtx.beginPath(); radarCtx.arc(rx, ry, 6, 0, Math.PI*2); radarCtx.fill();
                    }
                }
            }
        }


        // --- ДВИЖЕНИЕ И ЦИКЛ ИГРЫ ---
        let lastX = 0, lastZ = 0, ePressedPrev = false, qPressedPrev = false;
        let isMouseDown = false; let moveVec = { x: 0, z: 0 };

        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);
        window.addEventListener('mousemove', (e) => {
            if ((document.pointerLockElement === container || isMouseDown) && !inVent && gameActive && !isMapOpen) {
                yaw -= e.movementX * 0.0025; pitch -= e.movementY * 0.0025;
                pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
            }
        });
        container.addEventListener('click', () => { if(gameActive && !isMapOpen) container.requestPointerLock(); });

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if(!gameActive) { renderer.render(scene, camera); return; }

            if(!inVent && myRole !== 'Ghost') {
                moveVec = { x: 0, z: 0 };
                if(keys.KeyW || keys.ArrowUp) moveVec.z = 1; if(keys.KeyS || keys.ArrowDown) moveVec.z = -1;
                if(keys.KeyA || keys.ArrowLeft) moveVec.x = -1; if(keys.KeyD || keys.ArrowRight) moveVec.x = 1;

                let dirForward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let dirSide = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                let prePos = playerPos.clone();
                const speed = (myRole === 'Impostor') ? 0.65 : 0.45;

                playerPos.x += dirForward.x * moveVec.z * speed + dirSide.x * moveVec.x * speed;
                playerBB.setFromCenterAndSize(playerPos, new THREE.Vector3(playerRadius*2, 2, playerRadius*2));
                for(let box of wallsBB) { if(playerBB.intersectsBox(box)) { playerPos.x = prePos.x; break; } }

                playerPos.z += dirForward.z * moveVec.z * speed + dirSide.z * moveVec.x * speed;
                playerBB.setFromCenterAndSize(playerPos, new THREE.Vector3(playerRadius*2, 2, playerRadius*2));
                for(let box of wallsBB) { if(playerBB.intersectsBox(box)) { playerPos.z = prePos.z; break; } }
            }

            camera.position.copy(playerPos); camera.quaternion.setFromAxisAngle(new THREE.Vector3(0,1,0), yaw); camera.rotateX(pitch);
            playerLight.position.copy(playerPos);

            if(Math.abs(playerPos.x - lastX) > 0.02 || Math.abs(playerPos.z - lastZ) > 0.02) {
                connections.forEach(c => c.send({ 
                    type: 'player-move', x: playerPos.x, y: playerPos.y, z: playerPos.z, 
                    hidden: inVent, role: myRole, isDead: (myRole === 'Ghost'), color: mySelectedColor
                }));
                lastX = playerPos.x; lastZ = playerPos.z;
            }

            let nearObj = null;
            for(let obj of interactibles) { if(camera.position.distanceTo(obj.mesh.position) < obj.radius) { nearObj = obj; break; } }

            const prompt = document.getElementById('interaction-prompt');
            if(nearObj && myRole !== 'Ghost') {
                prompt.style.display = 'block';
                let triggerE = (keys.KeyE && !ePressedPrev);
                if(triggerE) {
                    if(nearObj.type === 'vent' && myRole === 'Crewmate') {
                        if(inVent) { exitVentAction(); } 
                        else if(ventUsesLeft > 0) {
                            inVent = true; ventUsesLeft--; ventTimeLeft = 7;
                            playerPos.set(nearObj.x, 0.5, nearObj.z); updateCrewHUD();
                            ventInterval = setInterval(() => {
                                ventTimeLeft--; updateCrewHUD();
                                if(ventTimeLeft <= 0) exitVentAction();
                            }, 1000);
                        }
                    }
                    if(nearObj.type === 'stairs') { playerPos.y = (playerPos.y < 4) ? nearObj.targetY : nearObj.groundY; }
                }
            } else { prompt.style.display = 'none'; }
            ePressedPrev = keys.KeyE;

            if(myRole === 'Impostor') {
                let targetId = null;
                for(let id in networkPlayers) {
                    if(networkPlayers[id].role === 'Crewmate' && !networkPlayers[id].isDead && camera.position.distanceTo(networkPlayers[id].mesh.position) < 5.0) { targetId = id; break; }
                }
                const killBtn = document.getElementById('btn-kill-mob');
                if(targetId) {
                    killBtn.style.opacity = '1';
                    if(keys.KeyQ && !qPressedPrev) {
                        connections.forEach(c => c.send({ type: 'kill-target', target: targetId }));
                        networkPlayers[targetId].isDead = true; networkPlayers[targetId].mesh.rotation.z = Math.PI / 2;
                    }
                } else { killBtn.style.opacity = '0.3'; }
            }
            qPressedPrev = keys.KeyQ;

            drawRadar(); renderer.render(scene, camera);
        }

        function exitVentAction() { clearInterval(ventInterval); inVent = false; playerPos.z += 4; updateCrewHUD(); }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
